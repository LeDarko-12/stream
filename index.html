<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MiStream ULTRA</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b0b0b;
color:white;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:#000;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
z-index:20;
}

.logo{
color:#e50914;
font-size:28px;
font-weight:bold;
}

.search{
background:#1a1a1a;
border:none;
padding:10px;
border-radius:6px;
color:white;
width:230px;
}

/* HERO */

.hero{
margin-top:70px;
height:75vh;
background-size:cover;
background-position:center;
display:flex;
align-items:end;
padding:60px;
background-image:linear-gradient(to top,black,rgba(0,0,0,.4),transparent);
}

.hero h1{
font-size:50px;
margin-bottom:10px;
}

/* ROW */

.row{
padding:25px;
}

.row-posters{
display:flex;
gap:12px;
overflow-x:auto;
}

.poster{
min-width:160px;
cursor:pointer;
border-radius:8px;
overflow:hidden;
position:relative;
transition:.3s;
}

.poster img{
width:100%;
}

.poster span{
position:absolute;
bottom:0;
width:100%;
padding:10px;
background:linear-gradient(transparent,rgba(0,0,0,.9));
opacity:0;
}

.poster:hover span{
opacity:1;
}

.poster:hover{
transform:scale(1.12);
}

/* PLAYER */

#player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
align-items:center;
z-index:50;
padding-top:60px;
}

.player-box{
width:85%;
height:60%;
}

.player-box iframe{
width:100%;
height:100%;
border:none;
}

.close{
position:absolute;
top:15px;
right:25px;
font-size:35px;
cursor:pointer;
}

/* SERVERS */

.server-selector{
margin-top:10px;
display:flex;
gap:8px;
}

button{
background:#222;
border:none;
padding:8px 14px;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#e50914;
}

/* TEMPORADAS */

.season-selector{
margin-top:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

/* EPISODIOS */

.episode-list{
margin-top:10px;
display:grid;
grid-template-columns:repeat(auto-fill,60px);
gap:8px;
justify-content:center;
}

.episode-active{
background:#e50914;
}

.footer{
margin-top:40px;
background:#000;
text-align:center;
padding:25px;
color:#777;
}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">MiStream</div>
<input class="search" id="search" placeholder="Buscar..." onkeyup="searchContent()">
</div>

<div class="hero" id="hero">
<h1 id="heroTitle">MiStream ULTRA</h1>
<button onclick="playHero()">▶ Ver ahora</button>
</div>

<div class="row">
<h2>🔥 Trending</h2>
<div id="trending" class="row-posters"></div>
</div>

<div class="row">
<h2>🎬 Películas populares</h2>
<div id="moviesPopular" class="row-posters"></div>
</div>

<div class="row">
<h2>📺 Series populares</h2>
<div id="seriesPopular" class="row-posters"></div>
</div>

<div class="row">
<h2>🍿 Anime</h2>
<div id="animePopular" class="row-posters"></div>
</div>

<div id="player">

<div class="close" onclick="closePlayer()">✕</div>

<div class="player-box">
<iframe id="framePlayer"></iframe>
</div>

<div id="servers" class="server-selector"></div>

<div id="seasonSelector" class="season-selector"></div>

<div id="episodeList" class="episode-list"></div>

</div>

<div class="footer">
MiStream ULTRA © 2026
</div>

<script>

const TMDB="8a2de0488825903a0a4b7d0ff12a3873"

let currentId
let currentType
let currentSeason=1
let currentEpisode=1

/* SERVERS */

const servers=[

{
name:"2Embed",
movie:id=>`https://www.2embed.cc/embed/${id}`,
tv:(id,s,e)=>`https://www.2embed.cc/embedtv/${id}?s=${s}&e=${e}`
},

{
name:"VidSrc",
movie:id=>`https://vidsrc.to/embed/movie/${id}`,
tv:(id,s,e)=>`https://vidsrc.to/embed/tv/${id}/${s}/${e}`
}

]

function openPlayer(id,type){

currentId=id
currentType=type

document.getElementById("player").style.display="flex"

loadServers()

if(type==="tv") loadSeasons()

}

function loadServers(){

let c=document.getElementById("servers")
c.innerHTML=""

servers.forEach((s,i)=>{

let b=document.createElement("button")

b.innerText=s.name

b.onclick=()=>playServer(i)

c.appendChild(b)

})

playServer(0)

}

function playServer(i){

let s=servers[i]

let url=currentType==="movie"
?s.movie(currentId)
:s.tv(currentId,currentSeason,currentEpisode)

document.getElementById("framePlayer").src=url

saveProgress()

}

function saveProgress(){

localStorage.setItem("continue",
JSON.stringify({
id:currentId,
type:currentType,
season:currentSeason,
episode:currentEpisode
})
)

}

function closePlayer(){

document.getElementById("player").style.display="none"
document.getElementById("framePlayer").src=""

}

/* TEMPORADAS */

async function loadSeasons(){

let r=await fetch(`https://api.themoviedb.org/3/tv/${currentId}?api_key=${TMDB}`)
let data=await r.json()

let box=document.getElementById("seasonSelector")
box.innerHTML=""

data.seasons
.sort((a,b)=>a.season_number-b.season_number)
.forEach(season=>{

if(season.season_number===0) return

let b=document.createElement("button")

b.innerText="Temp "+season.season_number

b.onclick=()=>{
currentSeason=season.season_number
loadEpisodes()
}

box.appendChild(b)

})

loadEpisodes()

}

/* EPISODIOS */

async function loadEpisodes(){

let r=await fetch(`https://api.themoviedb.org/3/tv/${currentId}/season/${currentSeason}?api_key=${TMDB}`)
let data=await r.json()

let list=document.getElementById("episodeList")
list.innerHTML=""

data.episodes.forEach(ep=>{

let b=document.createElement("button")

b.innerText=ep.episode_number

if(ep.episode_number===currentEpisode)
b.classList.add("episode-active")

b.onclick=()=>{
currentEpisode=ep.episode_number
playServer(0)
loadEpisodes()
}

list.appendChild(b)

})

}

/* ANIME */

async function loadAnime(){

let r=await fetch("https://api.jikan.moe/v4/top/anime")
let data=await r.json()

let row=document.getElementById("animePopular")

data.data.slice(0,12).forEach(async anime=>{

let div=document.createElement("div")
div.className="poster"

div.innerHTML=`
<img src="${anime.images.jpg.image_url}">
<span>${anime.title}</span>
`

div.onclick=async()=>{

let search=await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${TMDB}&query=${anime.title}`)

let res=await search.json()

if(res.results[0]){
openPlayer(res.results[0].id,"tv")
}

}

row.appendChild(div)

})

}

/* CATEGORIAS */

async function loadCategory(url,container,type){

let r=await fetch(url)
let data=await r.json()

let row=document.getElementById(container)

data.results.forEach(item=>{

if(!item.poster_path) return

let div=document.createElement("div")

div.className="poster"

div.innerHTML=`
<img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
<span>${item.title||item.name}</span>
`

div.onclick=()=>openPlayer(item.id,type)

row.appendChild(div)

})

}

/* HERO */

async function loadHero(){

let r=await fetch(`https://api.themoviedb.org/3/trending/movie/day?api_key=${TMDB}`)
let data=await r.json()

let m=data.results[0]

document.getElementById("hero").style.backgroundImage=
`url(https://image.tmdb.org/t/p/original${m.backdrop_path})`

document.getElementById("heroTitle").innerText=m.title

window.heroId=m.id

}

function playHero(){
openPlayer(heroId,"movie")
}

/* SEARCH */

async function searchContent(){

let q=document.getElementById("search").value

if(q.length<3) return

let r=await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB}&query=${q}`)
let data=await r.json()

let row=document.getElementById("trending")
row.innerHTML=""

data.results.forEach(item=>{

if(!item.poster_path) return

let div=document.createElement("div")

div.className="poster"

div.innerHTML=`
<img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
<span>${item.title||item.name}</span>
`

div.onclick=()=>openPlayer(item.id,item.media_type)

row.appendChild(div)

})

}

/* LOAD */

loadHero()
loadAnime()

loadCategory(`https://api.themoviedb.org/3/trending/movie/day?api_key=${TMDB}`,"trending","movie")
loadCategory(`https://api.themoviedb.org/3/movie/popular?api_key=${TMDB}`,"moviesPopular","movie")
loadCategory(`https://api.themoviedb.org/3/tv/popular?api_key=${TMDB}`,"seriesPopular","tv")

</script>

</body>
</html>
