<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MiStream PRO</title>

<style>
*{box-sizing:border-box}
body{margin:0;background:#0f0f0f;color:white;font-family:Arial}

.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:#000;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
z-index:10
}

.logo{color:#e50914;font-size:26px;font-weight:bold}

.search{
background:#1f1f1f;
border:none;
padding:8px 12px;
border-radius:6px;
color:white;
width:200px
}

.hero{
height:50vh;
margin-top:70px;
display:flex;
align-items:center;
padding:20px;
background:#111
}

.hero-content{
background:rgba(0,0,0,.6);
padding:20px;
border-radius:10px;
max-width:600px
}

.row{padding:20px}

.row-posters{
display:flex;
overflow-x:auto;
gap:10px
}

.poster{
min-width:130px;
cursor:pointer;
transition:.3s
}

.poster img{
width:100%;
border-radius:10px
}

.poster:hover{
transform:scale(1.15)
}

#player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
align-items:center;
z-index:100;
padding-top:50px
}

.player-box{
width:90%;
height:60%
}

.player-box iframe{
width:100%;
height:100%;
border:none
}

.server-selector{
margin-top:10px;
display:flex;
gap:10px;
flex-wrap:wrap
}

.server-selector button{
background:#222;
border:none;
color:white;
padding:8px 12px;
cursor:pointer;
border-radius:4px
}

.server-selector button:hover{
background:#e50914
}

.season-selector{
margin-top:10px
}

.episode-list{
margin-top:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center
}

.episode{
background:#222;
padding:10px 14px;
border-radius:6px;
cursor:pointer
}

.episode:hover{
background:#e50914
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:35px;
cursor:pointer
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">MiStream PRO</div>
<input class="search" id="search" placeholder="Buscar..." onkeyup="searchAll()">
</div>

<div class="hero">
<div class="hero-content">
<h1>MiStream</h1>
<p>Películas, series y anime.</p>
</div>
</div>

<div class="row">
<h2>🎬 Películas</h2>
<div id="movies" class="row-posters"></div>
</div>

<div class="row">
<h2>📺 Series</h2>
<div id="series" class="row-posters"></div>
</div>

<div class="row">
<h2>🌀 Anime</h2>
<div id="anime" class="row-posters"></div>
</div>

<div id="player">

<div class="close" onclick="closePlayer()">✕</div>

<div class="player-box">
<iframe id="framePlayer"></iframe>
</div>

<div class="server-selector" id="servers"></div>

<div class="season-selector" id="seasonSelector"></div>

<div class="episode-list" id="episodeList"></div>

</div>

<script>

const TMDB="8a2de0488825903a0a4b7d0ff12a3873"

let currentId
let currentType="movie"
let currentSeason=1
let currentEpisode=1

const servers=[

{
name:"2Embed",
movie:id=>`https://www.2embed.cc/embed/${id}`,
tv:id=>`https://www.2embed.cc/embedtv/${id}&s=${currentSeason}&e=${currentEpisode}`
},

{
name:"VidSrc",
movie:id=>`https://vidsrc.to/embed/movie/${id}`,
tv:id=>`https://vidsrc.to/embed/tv/${id}/${currentSeason}/${currentEpisode}`
},

{
name:"AutoEmbed",
movie:id=>`https://autoembed.cc/movie/tmdb/${id}`,
tv:id=>`https://autoembed.cc/tv/tmdb/${id}-${currentSeason}-${currentEpisode}`
}

]

function openPlayer(id,type){

currentId=id
currentType=type
currentSeason=1
currentEpisode=1

document.getElementById("player").style.display="flex"

if(type==="tv"){
loadSeasons()
}else{
document.getElementById("seasonSelector").innerHTML=""
document.getElementById("episodeList").innerHTML=""
}

loadServers()

}

function loadServers(){

let container=document.getElementById("servers")
container.innerHTML=""

servers.forEach(s=>{

let btn=document.createElement("button")
btn.innerText=s.name

btn.onclick=()=>{

let url=currentType==="movie"
?s.movie(currentId)
:s.tv(currentId)

document.getElementById("framePlayer").src=url

}

container.appendChild(btn)

})

let first=servers[0]

document.getElementById("framePlayer").src =
currentType==="movie"
?first.movie(currentId)
:first.tv(currentId)

}

async function loadSeasons(){

let r=await fetch(`https://api.themoviedb.org/3/tv/${currentId}?api_key=${TMDB}&language=es-ES`)
let data=await r.json()

let selector=document.getElementById("seasonSelector")

selector.innerHTML=""

data.seasons.forEach(season=>{

if(season.season_number===0) return

let btn=document.createElement("button")
btn.innerText="Temporada "+season.season_number

btn.onclick=()=>{

currentSeason=season.season_number
loadEpisodes()

}

selector.appendChild(btn)

})

loadEpisodes()

}

async function loadEpisodes(){

let r=await fetch(`https://api.themoviedb.org/3/tv/${currentId}/season/${currentSeason}?api_key=${TMDB}&language=es-ES`)
let data=await r.json()

let list=document.getElementById("episodeList")
list.innerHTML=""

data.episodes.forEach(ep=>{

let btn=document.createElement("div")
btn.className="episode"

btn.innerText="Episodio "+ep.episode_number

btn.onclick=()=>{

currentEpisode=ep.episode_number
loadServers()

}

list.appendChild(btn)

})

}

function closePlayer(){

document.getElementById("player").style.display="none"
document.getElementById("framePlayer").src=""

}

async function loadMovies(){

let r=await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${TMDB}&language=es-ES&page=1`)
let data=await r.json()

let row=document.getElementById("movies")
row.innerHTML=""

data.results.forEach(m=>{

if(!m.poster_path) return

let div=document.createElement("div")
div.className="poster"

div.innerHTML=`<img src="https://image.tmdb.org/t/p/w500${m.poster_path}">`

div.onclick=()=>openPlayer(m.id,"movie")

row.appendChild(div)

})

}

async function loadSeries(){

let r=await fetch(`https://api.themoviedb.org/3/tv/popular?api_key=${TMDB}&language=es-ES&page=1`)
let data=await r.json()

let row=document.getElementById("series")
row.innerHTML=""

data.results.forEach(s=>{

if(!s.poster_path) return

let div=document.createElement("div")
div.className="poster"

div.innerHTML=`<img src="https://image.tmdb.org/t/p/w500${s.poster_path}">`

div.onclick=()=>openPlayer(s.id,"tv")

row.appendChild(div)

})

}

async function loadAnime(){

let r=await fetch("https://api.jikan.moe/v4/top/anime")
let data=await r.json()

let row=document.getElementById("anime")
row.innerHTML=""

data.data.slice(0,20).forEach(a=>{

let div=document.createElement("div")
div.className="poster"

div.innerHTML=`<img src="${a.images.jpg.image_url}">`

div.onclick=()=>{

document.getElementById("player").style.display="flex"

document.getElementById("servers").innerHTML=""
document.getElementById("seasonSelector").innerHTML=""
document.getElementById("episodeList").innerHTML=""

document.getElementById("framePlayer").src=
`https://autoembed.cc/anime/mal/${a.mal_id}`

}

row.appendChild(div)

})

}

function searchAll(){

let q=document.getElementById("search").value.toLowerCase()

document.querySelectorAll(".poster").forEach(p=>{

p.style.display=p.innerHTML.toLowerCase().includes(q)?"block":"none"

})

}

loadMovies()
loadSeries()
loadAnime()

</script>

</body>
</html>
