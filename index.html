<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MiStream</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:#000;
display:flex;
align-items:center;
padding:0 40px;
z-index:100;
}

.logo{
color:#e50914;
font-size:28px;
font-weight:bold;
margin-right:40px;
}

.menu a{
color:white;
margin-right:20px;
text-decoration:none;
}

.search{
margin-left:auto;
}

.search input{
padding:8px;
border-radius:4px;
border:none;
}

/* HERO */

.hero{
height:500px;
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
padding:100px;
margin-top:70px;
background-image:linear-gradient(to top,#0f0f0f 10%,transparent),
url("https://image.tmdb.org/t/p/original/9Gtg2DzBhmYamXBS1hKAhiwbBKS.jpg");
}

.hero h1{
font-size:60px;
}

/* ROWS */

.row{
margin-top:40px;
padding-left:40px;
}

.row-posters{
display:flex;
overflow-x:auto;
padding-top:20px;
}

.poster{
width:200px;
margin-right:12px;
cursor:pointer;
transition:0.3s;
}

.poster:hover{
transform:scale(1.2);
}

.poster img{
width:100%;
border-radius:8px;
}

/* PLAYER */

#player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

.player-content{
width:90%;
max-width:1200px;
}

#video iframe{
width:100%;
height:80vh;
border:none;
}

.close{
position:absolute;
top:20px;
right:40px;
font-size:30px;
cursor:pointer;
}

/* EPISODES */

.episodes{
margin-top:10px;
display:flex;
flex-wrap:wrap;
}

.episodes button{
margin:4px;
padding:6px 10px;
border:none;
background:#222;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">MiStream</div>

<div class="menu">
<a href="#">Inicio</a>
<a href="#">Películas</a>
<a href="#">Series</a>
</div>

<div class="search">
<input id="search" placeholder="Buscar...">
</div>

</div>

<div class="hero">

<h1>MiStream</h1>
<p>Películas y series ilimitadas</p>

</div>

<div class="row">

<h2>🔥 Películas populares</h2>

<div class="row-posters" id="movies"></div>

</div>

<div class="row">

<h2>📺 Series populares</h2>

<div class="row-posters" id="series"></div>

</div>

<div class="row">

<h2>🍿 Tendencias</h2>

<div class="row-posters" id="trending"></div>

</div>

<div id="player">

<div class="close" onclick="closePlayer()">✕</div>

<div class="player-content">

<div id="video"></div>

<div class="episodes" id="episodes"></div>

</div>

</div>

<script>

/* API TMDB */

const API_KEY="8a2de0488825903a0a4b7d0ff12a3873"

/* CARGAR PELICULAS */

async function loadMovies(){

let res=await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=es`)
let data=await res.json()

render(data.results,"movies","movie")

}

/* CARGAR SERIES */

async function loadSeries(){

let res=await fetch(`https://api.themoviedb.org/3/tv/popular?api_key=${API_KEY}&language=es`)
let data=await res.json()

render(data.results,"series","tv")

}

/* TENDENCIAS */

async function loadTrending(){

let res=await fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${API_KEY}`)
let data=await res.json()

render(data.results,"trending","auto")

}

/* MOSTRAR POSTERS */

function render(list,container,type){

let row=document.getElementById(container)

row.innerHTML=""

list.forEach(item=>{

if(!item.poster_path) return

let poster=document.createElement("div")
poster.className="poster"

let img=`https://image.tmdb.org/t/p/w500${item.poster_path}`

poster.innerHTML=`<img src="${img}">`

poster.onclick=()=>{

if(type==="movie")
playMovie(item.id)

if(type==="tv")
playSeries(item.id)

if(type==="auto"){

if(item.media_type==="movie")
playMovie(item.id)

if(item.media_type==="tv")
playSeries(item.id)

}

}

row.appendChild(poster)

})

}

/* PELICULAS */

function playMovie(id){

document.getElementById("episodes").innerHTML=""

document.getElementById("video").innerHTML=`
<iframe src="https://vidsrc.to/embed/movie/${id}" allowfullscreen></iframe>
`

document.getElementById("player").style.display="flex"

}

/* SERIES */

async function playSeries(id){

let video=document.getElementById("video")
let episodes=document.getElementById("episodes")

video.innerHTML=""
episodes.innerHTML=""

let season=1

let res=await fetch(`https://api.themoviedb.org/3/tv/${id}/season/${season}?api_key=${API_KEY}`)
let data=await res.json()

data.episodes.forEach(ep=>{

let btn=document.createElement("button")

btn.innerText="Ep "+ep.episode_number

btn.onclick=()=>{

video.innerHTML=`
<iframe src="https://vidsrc.to/embed/tv/${id}/${season}/${ep.episode_number}" allowfullscreen></iframe>
`

}

episodes.appendChild(btn)

})

document.getElementById("player").style.display="flex"

}

/* CERRAR PLAYER */

function closePlayer(){

document.getElementById("player").style.display="none"
document.getElementById("video").innerHTML=""

}

/* BUSCADOR */

document.getElementById("search").addEventListener("keypress",async e=>{

if(e.key==="Enter"){

let q=e.target.value

let res=await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`)
let data=await res.json()

render(data.results,"movies","auto")

}

})

/* INICIO */

loadMovies()
loadSeries()
loadTrending()

</script>

</body>
</html>
