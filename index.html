<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>MiStream</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family: 'Segoe UI', Arial;
background:#0f0f0f;
color:white;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:linear-gradient(to bottom, rgba(0,0,0,.9), transparent);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 50px;
z-index:10;
}

.logo{
color:#e50914;
font-size:30px;
font-weight:bold;
}

.search{
background:#1f1f1f;
border:none;
padding:10px 15px;
border-radius:6px;
color:white;
width:250px;
}

/* HERO */

.hero{
height:520px;
margin-top:70px;
display:flex;
align-items:center;
padding-left:70px;
background-size:cover;
background-position:center;
position:relative;
}

.hero-content{
max-width:500px;
}

.hero h1{
font-size:50px;
margin:0;
}

.hero p{
color:#ccc;
margin-top:10px;
}

.hero button{
margin-top:20px;
padding:12px 25px;
font-size:16px;
background:#e50914;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

/* ROW */

.row{
margin-top:40px;
padding-left:50px;
}

.row h2{
margin-bottom:10px;
}

/* SCROLL */

.row-posters{
display:flex;
overflow-x:auto;
gap:15px;
padding:20px 0;
scroll-behavior:smooth;
}

.row-posters::-webkit-scrollbar{
display:none;
}

/* POSTER */

.poster{
min-width:180px;
cursor:pointer;
transition:.35s;
position:relative;
}

.poster img{
width:100%;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,.7);
}

.poster:hover{
transform:scale(1.15);
z-index:5;
}

/* PLAYER */

#player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
display:none;
justify-content:center;
align-items:center;
z-index:100;
flex-direction:column;
}

.player-box{
width:90%;
max-width:1200px;
}

iframe{
width:100%;
height:70vh;
border:none;
border-radius:10px;
}

.close{
position:absolute;
top:20px;
right:40px;
font-size:35px;
cursor:pointer;
}

/* EPISODES */

.episodes{
margin-top:10px;
display:flex;
flex-wrap:wrap;
gap:6px;
}

.episodes button{
padding:8px 12px;
border:none;
background:#222;
color:white;
border-radius:4px;
cursor:pointer;
}

.episodes button:hover{
background:#e50914;
}

/* RESPONSIVE */

@media(max-width:800px){

.hero{
height:420px;
padding-left:30px;
}

.hero h1{
font-size:35px;
}

.poster{
min-width:140px;
}

}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">MiStream</div>

<input class="search" placeholder="Buscar...">

</div>

<div id="hero" class="hero">

<div class="hero-content" id="heroContent"></div>

</div>

<div class="row">

<h2>🔥 Películas populares</h2>

<div id="movies" class="row-posters"></div>

</div>

<div class="row">

<h2>📺 Series populares</h2>

<div id="series" class="row-posters"></div>

</div>

<div id="player">

<div class="close" onclick="closePlayer()">✕</div>

<div class="player-box">

<div id="video"></div>

<div id="episodes" class="episodes"></div>

</div>

</div>

<script>

const API="8a2de0488825903a0a4b7d0ff12a3873"

let currentId
let currentType
let season=1

/* HERO */

async function loadHero(){

let r=await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API}&language=es-ES`)
let d=await r.json()

let movie=d.results[0]

let hero=document.getElementById("hero")

hero.style.backgroundImage=`
linear-gradient(to right,#0f0f0f,transparent),
url(https://image.tmdb.org/t/p/original${movie.backdrop_path})
`

document.getElementById("heroContent").innerHTML=`

<h1>${movie.title}</h1>

<p>${movie.overview.slice(0,150)}...</p>

<button onclick="play(${movie.id},'movie')">▶ Ver ahora</button>

`

}

/* FILTRO ESPAÑOL */

async function tieneEspanol(id,tipo){

let r=await fetch(`https://api.themoviedb.org/3/${tipo}/${id}?api_key=${API}`)
let d=await r.json()

if(!d.spoken_languages) return false

return d.spoken_languages.some(l=>l.iso_639_1==="es")

}

/* MOVIES */

async function loadMovies(){

let r=await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API}&language=es-ES`)
let d=await r.json()

render(d.results,"movies","movie")

}

/* SERIES */

async function loadSeries(){

let r=await fetch(`https://api.themoviedb.org/3/tv/popular?api_key=${API}&language=es-ES`)
let d=await r.json()

render(d.results,"series","tv")

}

/* RENDER */

async function render(list,container,type){

let row=document.getElementById(container)

row.innerHTML=""

for(let item of list){

if(!item.poster_path) continue

let esp=await tieneEspanol(item.id,type)

if(!esp) continue

let div=document.createElement("div")

div.className="poster"

div.innerHTML=`
<img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
`

div.onclick=()=>play(item.id,type)

row.appendChild(div)

}

}

/* PLAY */

async function play(id,type){

currentId=id
currentType=type

document.getElementById("player").style.display="flex"

document.getElementById("episodes").innerHTML=""

if(type==="movie"){

document.getElementById("video").innerHTML=`
<iframe src="https://vidsrc.to/embed/movie/${id}?lang=es&subtitle=es"></iframe>
`

}else{

for(let i=1;i<=10;i++){

let b=document.createElement("button")

b.innerText="Ep "+i

b.onclick=()=>playEpisode(i)

document.getElementById("episodes").appendChild(b)

}

playEpisode(1)

}

}

/* EPISODIO */

function playEpisode(ep){

document.getElementById("video").innerHTML=`
<iframe src="https://vidsrc.to/embed/tv/${currentId}/${season}/${ep}?lang=es&subtitle=es"></iframe>
`

}

/* CLOSE */

function closePlayer(){

document.getElementById("player").style.display="none"

document.getElementById("video").innerHTML=""

}

loadHero()
loadMovies()
loadSeries()

</script>

</body>
</html>
