<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>MiStream</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#141414;
color:white;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
display:flex;
align-items:center;
padding:0 40px;
z-index:10;
}

.logo{
color:#e50914;
font-size:30px;
font-weight:bold;
margin-right:40px;
}

.menu a{
margin-right:20px;
text-decoration:none;
color:white;
font-size:15px;
}

.menu a:hover{
color:#bbb;
}

/* BANNER */

.banner{
height:500px;
background-image:url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba");
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
padding:80px;
margin-bottom:40px;
}

.banner h1{
font-size:60px;
margin-bottom:20px;
}

.banner p{
width:500px;
margin-bottom:20px;
}

.banner button{
padding:12px 25px;
margin-right:10px;
border:none;
font-size:16px;
cursor:pointer;
}

.play{
background:white;
}

.info{
background:rgba(109,109,110,0.7);
color:white;
}

/* FILAS */

.row{
margin-top:40px;
padding-left:40px;
}

.row h2{
margin-bottom:10px;
}

.row-posters{
display:flex;
overflow-x:auto;
padding-bottom:20px;
}

.poster{
width:180px;
margin-right:10px;
transition:transform 0.3s;
cursor:pointer;
}

.poster:hover{
transform:scale(1.15);
}

.poster img{
width:100%;
border-radius:4px;
}

.row-posters::-webkit-scrollbar{
display:none;
}

/* REPRODUCTOR */

#player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:100;
}

#cerrar{
position:absolute;
top:20px;
right:30px;
font-size:30px;
background:none;
border:none;
color:white;
cursor:pointer;
}

iframe{
width:80%;
height:80%;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">MiStream</div>

<div class="menu">
<a href="#">Inicio</a>
<a href="#">Series</a>
<a href="#">Películas</a>
<a href="#">Mi lista</a>
</div>

</div>

<!-- BANNER -->

<div class="banner">

<h1>Bienvenido a MiStream</h1>

<p>
Disfruta de una colección de películas y series directamente desde tu plataforma.
</p>

<div>
<button class="play">▶ Reproducir</button>
<button class="info">Más información</button>
</div>

</div>

<!-- FILA DE PELÍCULAS -->

<div class="row">

<h2>Películas</h2>

<div class="row-posters" id="movies-container"></div>

</div>

<!-- REPRODUCTOR -->

<div id="player">

<button id="cerrar" onclick="cerrarVideo()">X</button>

<div id="video-container"></div>

</div>

<script>

fetch("movies.json")
.then(response => response.json())
.then(data => {

let container = document.getElementById("movies-container")

data.forEach(movie => {

let poster = document.createElement("div")
poster.className = "poster"

poster.innerHTML = `
<img src="${movie.poster}">
`

poster.onclick = function(){
reproducir(movie.video)
}

container.appendChild(poster)

})

})

function reproducir(video){

let player = document.getElementById("player")
let videoContainer = document.getElementById("video-container")

videoContainer.innerHTML = `
<iframe src="${video}" frameborder="0" allowfullscreen></iframe>
`

player.style.display = "flex"

}

function cerrarVideo(){

let player = document.getElementById("player")
let videoContainer = document.getElementById("video-container")

videoContainer.innerHTML = ""
player.style.display = "none"

}

</script>

</body>
</html>
