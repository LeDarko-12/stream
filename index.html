<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>MiStream</title>

<style>

body{
margin:0;
font-family:Arial;
background:#141414;
color:white;
}

.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:black;
display:flex;
align-items:center;
padding:0 40px;
z-index:10;
}

.logo{
color:#e50914;
font-size:28px;
font-weight:bold;
}

.hero{
height:450px;
margin-top:70px;
display:flex;
align-items:center;
padding-left:60px;
background-size:cover;
background-position:center;
}

.row{
margin-top:30px;
padding-left:40px;
}

.row-posters{
display:flex;
overflow-x:auto;
padding-top:20px;
}

.poster{
width:180px;
margin-right:10px;
cursor:pointer;
transition:.3s;
}

.poster:hover{
transform:scale(1.1);
}

.poster img{
width:100%;
border-radius:6px;
}

#player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:100;
}

.player-box{
width:90%;
max-width:1200px;
}

iframe{
width:100%;
height:80vh;
border:none;
}

.close{
position:absolute;
top:20px;
right:40px;
font-size:30px;
cursor:pointer;
}

.episodes button{
margin:3px;
padding:5px 10px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">MiStream</div>
</div>

<div id="hero" class="hero"></div>

<div class="row">
<h2>Películas en Español</h2>
<div id="movies" class="row-posters"></div>
</div>

<div class="row">
<h2>Series en Español</h2>
<div id="series" class="row-posters"></div>
</div>

<div id="player">

<div class="close" onclick="closePlayer()">✕</div>

<div class="player-box">

<div id="video"></div>

<div id="episodes"></div>

</div>

</div>

<script>

const API="8a2de0488825903a0a4b7d0ff12a3873"

let currentId
let currentType
let season=1

/* HERO */

async function loadHero(){

let r=await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API}&language=es-ES&region=ES`)
let d=await r.json()

let movie=d.results[0]

let hero=document.getElementById("hero")

hero.style.backgroundImage=`
linear-gradient(to top,#141414,transparent),
url(https://image.tmdb.org/t/p/original${movie.backdrop_path})
`

hero.innerHTML=`<h1>${movie.title}</h1>`

}

/* FILTRO ESPAÑOL */

async function tieneEspanol(id,tipo){

let r=await fetch(`https://api.themoviedb.org/3/${tipo}/${id}?api_key=${API}`)
let d=await r.json()

if(!d.spoken_languages) return false

return d.spoken_languages.some(l=>l.iso_639_1==="es")

}

/* PELICULAS */

async function loadMovies(){

let r=await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API}&language=es-ES`)
let d=await r.json()

render(d.results,"movies","movie")

}

/* SERIES */

async function loadSeries(){

let r=await fetch(`https://api.themoviedb.org/3/tv/popular?api_key=${API}&language=es-ES`)
let d=await r.json()

render(d.results,"series","tv")

}

/* RENDER */

async function render(list,container,type){

let row=document.getElementById(container)

row.innerHTML=""

for(let item of list){

if(!item.poster_path) continue

let esp=await tieneEspanol(item.id,type)

if(!esp) continue

let div=document.createElement("div")

div.className="poster"

div.innerHTML=`
<img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
`

div.onclick=()=>play(item.id,type)

row.appendChild(div)

}

}

/* PLAY */

async function play(id,type){

currentId=id
currentType=type

document.getElementById("player").style.display="flex"

document.getElementById("episodes").innerHTML=""

if(type==="movie"){

document.getElementById("video").innerHTML=`
<iframe src="https://vidsrc.to/embed/movie/${id}?lang=es&subtitle=es"></iframe>
`

}else{

for(let i=1;i<=10;i++){

let b=document.createElement("button")

b.innerText="Ep "+i

b.onclick=()=>playEpisode(i)

document.getElementById("episodes").appendChild(b)

}

playEpisode(1)

}

}

/* EPISODIO */

function playEpisode(ep){

document.getElementById("video").innerHTML=`
<iframe src="https://vidsrc.to/embed/tv/${currentId}/${season}/${ep}?lang=es&subtitle=es"></iframe>
`

}

/* CERRAR */

function closePlayer(){

document.getElementById("player").style.display="none"

document.getElementById("video").innerHTML=""

}

loadHero()
loadMovies()
loadSeries()

</script>

</body>
</html>
