<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MiStream PRO</title>

<style>
*{box-sizing:border-box}
body{margin:0;background:#0f0f0f;color:white;font-family:Arial}
.navbar{position:fixed;top:0;width:100%;height:70px;background:#000;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:10}
.logo{color:#e50914;font-size:26px;font-weight:bold}
.search{background:#1f1f1f;border:none;padding:8px 12px;border-radius:6px;color:white;width:180px}

.hero{height:50vh;margin-top:70px;display:flex;align-items:center;padding:20px;background:#111}
.hero-content{background:rgba(0,0,0,.6);padding:20px;border-radius:10px;max-width:600px}

.row{padding:20px}
.row h2{margin-bottom:10px}
.row-posters{display:flex;overflow-x:auto;gap:10px}

.poster{min-width:130px;cursor:pointer;transition:.3s}
.poster img{width:100%;border-radius:10px}
.poster:hover{transform:scale(1.15)}

#player{position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:none;flex-direction:column;justify-content:flex-start;align-items:center;z-index:100;padding-top:50px}

.player-box{width:90%;height:70%}
.player-box iframe{width:100%;height:100%;border:none}

.close{position:absolute;top:20px;right:30px;font-size:35px;cursor:pointer}

.episode-list{margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

.episode{
background:#222;
padding:10px 14px;
border-radius:6px;
cursor:pointer
}

.episode:hover{
background:#e50914
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">MiStream PRO</div>
<input class="search" id="search" placeholder="Buscar..." onkeyup="searchSeries()">
</div>

<div class="hero">
<div class="hero-content">
<h1>MiStream</h1>
<p>Catálogo cargado desde tu propio scraper.</p>
</div>
</div>

<div class="row">
<h2>📺 Series</h2>
<div id="series" class="row-posters"></div>
</div>

<div id="player">

<div class="close" onclick="closePlayer()">✕</div>

<div class="player-box">
<iframe id="framePlayer"></iframe>
</div>

<div class="episode-list" id="episodeList"></div>

</div>

<script>

let seriesData=[]

async function loadSeries(){

let res = await fetch("series.json")

seriesData = await res.json()

renderSeries(seriesData)

}

function renderSeries(list){

let container=document.getElementById("series")

container.innerHTML=""

list.forEach((serie,index)=>{

let div=document.createElement("div")

div.className="poster"

div.innerHTML=`<img src="${serie.poster}">`

div.onclick=()=>openSeries(index)

container.appendChild(div)

})

}

function openSeries(index){

let serie=seriesData[index]

document.getElementById("player").style.display="flex"

let list=document.getElementById("episodeList")

list.innerHTML=`<h2>${serie.title}</h2>`

document.getElementById("framePlayer").src=""

serie.episodes.forEach((ep,i)=>{

let btn=document.createElement("div")

btn.className="episode"

btn.innerText="Episodio "+(i+1)

btn.onclick=()=>playEpisode(ep.embed)

list.appendChild(btn)

})

}

function playEpisode(url){

document.getElementById("framePlayer").src=url

}

function closePlayer(){

document.getElementById("player").style.display="none"

document.getElementById("framePlayer").src=""

}

function searchSeries(){

let q=document.getElementById("search").value.toLowerCase()

let filtered=seriesData.filter(s=>s.title.toLowerCase().includes(q))

renderSeries(filtered)

}

loadSeries()

</script>

</body>
</html>
