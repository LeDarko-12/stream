<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MiStream ULTRA</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b0b0b;
color:white;
}

.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:#000;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
z-index:20;
}

.logo{
color:#e50914;
font-size:28px;
font-weight:bold;
}

.search{
background:#1a1a1a;
border:none;
padding:10px;
border-radius:6px;
color:white;
width:230px;
}

.hero{
margin-top:70px;
height:75vh;
background-size:cover;
background-position:center;
display:flex;
align-items:end;
padding:60px;
background-image:linear-gradient(to top,black,rgba(0,0,0,.4),transparent);
}

.hero-content{
max-width:500px;
}

.hero h1{
font-size:50px;
margin-bottom:10px;
}

.row{
padding:25px;
}

.row h2{
margin-bottom:12px;
}

.row-posters{
display:flex;
gap:12px;
overflow-x:auto;
scroll-behavior:smooth;
padding-bottom:10px;
}

.poster{
min-width:160px;
cursor:pointer;
position:relative;
transition:.35s;
border-radius:8px;
overflow:hidden;
}

.poster img{
width:100%;
}

.poster span{
position:absolute;
bottom:0;
width:100%;
padding:10px;
background:linear-gradient(transparent,rgba(0,0,0,.9));
opacity:0;
font-size:13px;
}

.poster:hover span{
opacity:1;
}

.poster:hover{
transform:scale(1.15);
z-index:10;
box-shadow:0 0 20px rgba(0,0,0,0.8);
}

#player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
align-items:center;
z-index:50;
padding-top:60px;
}

.player-box{
width:85%;
height:65%;
}

.player-box iframe{
width:100%;
height:100%;
border:none;
}

.close{
position:absolute;
top:15px;
right:25px;
font-size:35px;
cursor:pointer;
}

.server-selector,
.season-selector,
.episode-list{
margin-top:10px;
display:flex;
gap:8px;
flex-wrap:wrap;
justify-content:center;
}

button{
background:#222;
border:none;
padding:8px 14px;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#e50914;
}

.footer{
margin-top:40px;
background:#000;
text-align:center;
padding:25px;
color:#777;
}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">MiStream</div>
<input class="search" id="search" placeholder="Buscar..." onkeyup="searchContent()">
</div>

<div class="hero" id="hero">
<div class="hero-content">
<h1 id="heroTitle">MiStream ULTRA</h1>
<button onclick="playHero()">▶ Ver ahora</button>
</div>
</div>

<div class="row">
<h2>🔥 Trending</h2>
<div id="trending" class="row-posters"></div>
</div>

<div class="row">
<h2>🎬 Películas populares</h2>
<div id="moviesPopular" class="row-posters"></div>
</div>

<div class="row">
<h2>📺 Series populares</h2>
<div id="seriesPopular" class="row-posters"></div>
</div>

<div class="row">
<h2>🏆 Películas mejor valoradas</h2>
<div id="moviesTop" class="row-posters"></div>
</div>

<div class="row">
<h2>🏆 Series mejor valoradas</h2>
<div id="seriesTop" class="row-posters"></div>
</div>

<div class="row">
<h2>🍿 Anime popular</h2>
<div id="animePopular" class="row-posters"></div>
</div>

<div id="player">

<div class="close" onclick="closePlayer()">✕</div>

<div class="player-box">
<iframe id="framePlayer"></iframe>
</div>

<div class="server-selector" id="servers"></div>
<div class="season-selector" id="seasonSelector"></div>
<div class="episode-list" id="episodeList"></div>

</div>

<div class="footer">
MiStream ULTRA © 2026
</div>

<script>

const TMDB="8a2de0488825903a0a4b7d0ff12a3873"
const TRAKT="6ad19c53baea6af57b902daa5d094b60833913e5cd6bb09554a162602b1bb98c"

let currentId
let currentType
let currentSeason=1
let currentEpisode=1

const pages={}

const servers=[

{
name:"2Embed",
movie:id=>`https://www.2embed.cc/embed/${id}`,
tv:id=>`https://www.2embed.cc/embedtv/${id}?s=${currentSeason}&e=${currentEpisode}`
},

{
name:"VidSrc",
movie:id=>`https://vidsrc.to/embed/movie/${id}`,
tv:id=>`https://vidsrc.to/embed/tv/${id}/${currentSeason}/${currentEpisode}`
}

]

function openPlayer(id,type){

currentId=id
currentType=type

currentSeason=1
currentEpisode=1

document.getElementById("player").style.display="flex"

loadServers()

if(type==="tv") loadSeasons()

}

function closePlayer(){

document.getElementById("player").style.display="none"
document.getElementById("framePlayer").src=""

}

function loadServers(){

let c=document.getElementById("servers")
c.innerHTML=""

servers.forEach((s,i)=>{

let b=document.createElement("button")

b.innerText=s.name

b.onclick=()=>playServer(i)

c.appendChild(b)

})

playServer(0)

}

function playServer(i){

let s=servers[i]

let url=currentType==="movie"
?s.movie(currentId)
:s.tv(currentId)

document.getElementById("framePlayer").src=url

}

async function loadSeasons(){

let r=await fetch(`https://api.themoviedb.org/3/tv/${currentId}?api_key=${TMDB}&language=es`)
let data=await r.json()

let box=document.getElementById("seasonSelector")
box.innerHTML=""

data.seasons.forEach(season=>{

if(season.season_number===0) return

let b=document.createElement("button")
b.innerText="Temp "+season.season_number

b.onclick=()=>{

currentSeason=season.season_number
loadEpisodes()

}

box.appendChild(b)

})

loadEpisodes()

}

async function loadEpisodes(){

let r=await fetch(`https://api.themoviedb.org/3/tv/${currentId}/season/${currentSeason}?api_key=${TMDB}&language=es`)
let data=await r.json()

let list=document.getElementById("episodeList")
list.innerHTML=""

data.episodes.forEach(ep=>{

let b=document.createElement("button")

b.innerText="E"+ep.episode_number

b.onclick=()=>{

currentEpisode=ep.episode_number
playServer(0)

}

list.appendChild(b)

})

}

async function loadCategory(url,container,type){

if(!pages[container]) pages[container]=1

let r=await fetch(`${url}&language=es&page=${pages[container]}`)
let data=await r.json()

let row=document.getElementById(container)

data.results.forEach(item=>{

if(!item.poster_path) return

let div=document.createElement("div")

div.className="poster"

div.innerHTML=`
<img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
<span>${item.title||item.name}</span>
`

div.onclick=()=>openPlayer(item.id,type)

row.appendChild(div)

})

pages[container]++

row.onscroll=()=>{

if(row.scrollLeft + row.clientWidth >= row.scrollWidth-300){

loadCategory(url,container,type)

}

}

}

async function loadTrakt(){

let r=await fetch("https://api.trakt.tv/movies/trending",{
headers:{
"Content-Type":"application/json",
"trakt-api-version":"2",
"trakt-api-key":TRAKT
}
})

let data=await r.json()

data.slice(0,10).forEach(async m=>{

let tmdb=await fetch(`https://api.themoviedb.org/3/find/${m.movie.ids.imdb}?api_key=${TMDB}&external_source=imdb_id`)

let info=await tmdb.json()

if(!info.movie_results[0]) return

let movie=info.movie_results[0]

let row=document.getElementById("trending")

let div=document.createElement("div")

div.className="poster"

div.innerHTML=`
<img src="https://image.tmdb.org/t/p/w500${movie.poster_path}">
<span>${movie.title}</span>
`

div.onclick=()=>openPlayer(movie.id,"movie")

row.appendChild(div)

})

}

async function loadAnime(){

let r=await fetch("https://api.jikan.moe/v4/top/anime")

let data=await r.json()

let row=document.getElementById("animePopular")

data.data.slice(0,12).forEach(anime=>{

let div=document.createElement("div")

div.className="poster"

div.innerHTML=`
<img src="${anime.images.jpg.image_url}">
<span>${anime.title}</span>
`

row.appendChild(div)

})

}

async function loadHero(){

let r=await fetch(`https://api.themoviedb.org/3/trending/movie/day?api_key=${TMDB}&language=es`)

let data=await r.json()

let m=data.results[0]

document.getElementById("hero").style.backgroundImage=
`url(https://image.tmdb.org/t/p/original${m.backdrop_path})`

document.getElementById("heroTitle").innerText=m.title

window.heroId=m.id

}

function playHero(){
openPlayer(heroId,"movie")
}

async function searchContent(){

let q=document.getElementById("search").value

if(q.length<3) return

let r=await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB}&language=es&query=${q}`)
let data=await r.json()

let row=document.getElementById("trending")
row.innerHTML=""

data.results.forEach(item=>{

if(!item.poster_path) return

let div=document.createElement("div")

div.className="poster"

div.innerHTML=`
<img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
<span>${item.title||item.name}</span>
`

div.onclick=()=>openPlayer(item.id,item.media_type)

row.appendChild(div)

})

}

loadHero()
loadTrakt()
loadAnime()

loadCategory(`https://api.themoviedb.org/3/movie/popular?api_key=${TMDB}`,"moviesPopular","movie")
loadCategory(`https://api.themoviedb.org/3/tv/popular?api_key=${TMDB}`,"seriesPopular","tv")
loadCategory(`https://api.themoviedb.org/3/movie/top_rated?api_key=${TMDB}`,"moviesTop","movie")
loadCategory(`https://api.themoviedb.org/3/tv/top_rated?api_key=${TMDB}`,"seriesTop","tv")

</script>

</body>
</html>
