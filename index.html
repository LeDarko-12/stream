<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>MiStream</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#141414;
color:white;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
display:flex;
align-items:center;
padding:0 40px;
z-index:10;
}

.logo{
color:#e50914;
font-size:30px;
font-weight:bold;
margin-right:40px;
}

.menu a{
margin-right:20px;
text-decoration:none;
color:white;
font-size:15px;
}

/* BUSCADOR */

.search-box{
margin-left:auto;
}

.search-box input{
padding:8px;
border:none;
border-radius:4px;
}

/* BANNER */

.banner{
height:500px;
background-image:url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba");
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
padding:80px;
margin-bottom:40px;
}

.banner h1{
font-size:60px;
margin-bottom:20px;
}

/* FILAS */

.row{
margin-top:40px;
padding-left:40px;
}

.row h2{
margin-bottom:10px;
}

.row-posters{
display:flex;
overflow-x:auto;
padding-bottom:20px;
}

.poster{
width:180px;
margin-right:10px;
transition:transform 0.3s;
cursor:pointer;
}

.poster:hover{
transform:scale(1.15);
}

.poster img{
width:100%;
border-radius:4px;
}

/* REPRODUCTOR */

#player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

.player-content{
width:90%;
max-width:1200px;
position:relative;
}

#video-container iframe{
width:100%;
height:80vh;
border:none;
}

.close-btn{
position:absolute;
top:-40px;
right:0;
font-size:30px;
background:none;
border:none;
color:white;
cursor:pointer;
}

.close-btn:hover{
color:#e50914;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">MiStream</div>

<div class="menu">
<a href="#">Inicio</a>
<a href="#">Series</a>
<a href="#">Películas</a>
</div>

<div class="search-box">
<input type="text" id="search" placeholder="Buscar...">
</div>

</div>

<!-- BANNER -->

<div class="banner">
<h1>MiStream</h1>
<p>Películas y series ilimitadas</p>
</div>

<!-- PELICULAS -->

<div class="row">
<h2>Películas populares</h2>
<div class="row-posters" id="movies"></div>
</div>

<!-- SERIES -->

<div class="row">
<h2>Series populares</h2>
<div class="row-posters" id="series"></div>
</div>

<!-- REPRODUCTOR -->

<div id="player">

<div class="player-content">

<button class="close-btn" onclick="cerrarVideo()">✕</button>

<div id="video-container"></div>

</div>

</div>

<script>

const API_KEY="TU_API_KEY"

/* CARGAR PELICULAS */

fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=es`)

.then(res=>res.json())

.then(data=>{

let container=document.getElementById("movies")

data.results.forEach(movie=>{

let poster=document.createElement("div")

poster.className="poster"

poster.innerHTML=`
<img src="https://image.tmdb.org/t/p/w500${movie.poster_path}">
`

poster.onclick=()=>{

reproducir(movie.id,"movie")

}

container.appendChild(poster)

})

})

/* CARGAR SERIES */

fetch(`https://api.themoviedb.org/3/tv/popular?api_key=${API_KEY}&language=es`)

.then(res=>res.json())

.then(data=>{

let container=document.getElementById("series")

data.results.forEach(show=>{

let poster=document.createElement("div")

poster.className="poster"

poster.innerHTML=`
<img src="https://image.tmdb.org/t/p/w500${show.poster_path}">
`

poster.onclick=()=>{

reproducirSerie(show.id)

}

container.appendChild(poster)

})

})

/* REPRODUCTOR PELICULAS */

function reproducir(id,tipo){

let player=document.getElementById("player")

let video=document.getElementById("video-container")

video.innerHTML=`
<iframe
src="https://multiembed.mov/?tmdb=${id}&type=${tipo}"
allowfullscreen>
</iframe>
`

player.style.display="flex"

}

/* SERIES */

function reproducirSerie(id){

let season=1
let episode=1

let player=document.getElementById("player")

let video=document.getElementById("video-container")

video.innerHTML=`
<iframe
src="https://multiembed.mov/?tmdb=${id}&s=${season}&e=${episode}"
allowfullscreen>
</iframe>
`

player.style.display="flex"

}

function cerrarVideo(){

document.getElementById("player").style.display="none"

document.getElementById("video-container").innerHTML=""

}

/* BUSCADOR */

document.getElementById("search").addEventListener("keyup",function(){

let query=this.value

if(query.length<3) return

fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${query}`)

.then(res=>res.json())

.then(data=>{

let container=document.getElementById("movies")

container.innerHTML=""

data.results.forEach(movie=>{

let poster=document.createElement("div")

poster.className="poster"

poster.innerHTML=`
<img src="https://image.tmdb.org/t/p/w500${movie.poster_path}">
`

poster.onclick=()=>{

reproducir(movie.id,"movie")

}

container.appendChild(poster)

})

})

})

</script>

</body>
</html>
