<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>MiStream</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#141414;
color:white;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:black;
display:flex;
align-items:center;
padding:0 40px;
z-index:10;
}

.logo{
color:#e50914;
font-size:30px;
font-weight:bold;
margin-right:30px;
}

.menu a{
color:white;
margin-right:20px;
text-decoration:none;
}

.search{
margin-left:auto;
}

.search input{
padding:8px;
border:none;
border-radius:4px;
}

/* BANNER */

.banner{
height:450px;
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
padding:80px;
margin-top:70px;
}

/* FILAS */

.row{
margin-top:40px;
padding-left:40px;
}

.row-posters{
display:flex;
overflow-x:auto;
}

.poster{
width:180px;
margin-right:10px;
cursor:pointer;
transition:0.3s;
}

.poster:hover{
transform:scale(1.15);
}

.poster img{
width:100%;
border-radius:4px;
}

/* REPRODUCTOR */

#player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

.player-content{
width:90%;
max-width:1200px;
position:relative;
}

#video-container iframe{
width:100%;
height:80vh;
border:none;
}

.close-btn{
position:absolute;
top:-40px;
right:0;
font-size:30px;
background:none;
border:none;
color:white;
cursor:pointer;
}

.episodes{
margin-top:10px;
}

.episodes button{
margin:4px;
padding:6px 10px;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">MiStream</div>

<div class="menu">
<a href="#">Inicio</a>
<a href="#">Series</a>
<a href="#">Películas</a>
</div>

<div class="search">
<input type="text" id="search" placeholder="Buscar...">
</div>

</div>

<div class="banner" id="banner">

<h1>MiStream</h1>
<p>Películas, series y anime</p>

</div>

<!-- PELICULAS -->

<div class="row">

<h2>🔥 Películas</h2>

<div class="row-posters" id="movies"></div>

</div>

<!-- ANIME -->

<div class="row">

<h2>📺 Anime</h2>

<div class="row-posters" id="anime"></div>

</div>

<!-- REPRODUCTOR -->

<div id="player">

<div class="player-content">

<button class="close-btn" onclick="cerrarVideo()">✕</button>

<div id="video-container"></div>

<div class="episodes" id="episodes"></div>

</div>

</div>

<script>

/* PELICULAS */

const movies=[

{
title:"Interstellar",
poster:"https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg",
imdb:"tt0816692"
},

{
title:"Joker",
poster:"https://image.tmdb.org/t/p/w500/udDclJoHjfjb8Ekgsd4FDteOkCU.jpg",
imdb:"tt7286456"
},

{
title:"Avengers Endgame",
poster:"https://image.tmdb.org/t/p/w500/or06FN3Dka5tukK1e9sl16pB3iy.jpg",
imdb:"tt4154796"
}

]

/* ANIME */

const anime=[

{
title:"Naruto",
poster:"https://image.tmdb.org/t/p/w500/x2LSRK2Cm7MZhjluni1msVJ3wDF.jpg",
id:"naruto"
},

{
title:"Demon Slayer",
poster:"https://image.tmdb.org/t/p/w500/xUfRZu2mi8jH6SzQEJGP6tjBuYj.jpg",
id:"kimetsu-no-yaiba"
}

]

/* CARGAR CONTENIDO */

function cargar(lista,container){

let cont=document.getElementById(container)

lista.forEach(item=>{

let div=document.createElement("div")

div.className="poster"

div.innerHTML=`<img src="${item.poster}">`

div.onclick=()=>{

if(container==="movies") reproducirPelicula(item.imdb)

if(container==="anime") abrirAnime(item.id)

}

cont.appendChild(div)

})

}

cargar(movies,"movies")
cargar(anime,"anime")

/* REPRODUCTOR PELICULA */

function reproducirPelicula(imdb){

document.getElementById("episodes").innerHTML=""

let video=document.getElementById("video-container")

video.innerHTML=`
<iframe src="https://multiembed.mov/?video_id=${imdb}" allowfullscreen></iframe>
`

document.getElementById("player").style.display="flex"

}

/* ANIME */

function abrirAnime(id){

let video=document.getElementById("video-container")

let episodes=document.getElementById("episodes")

video.innerHTML=""

episodes.innerHTML=""

for(let i=1;i<=12;i++){

let btn=document.createElement("button")

btn.innerText="Ep "+i

btn.onclick=()=>{

video.innerHTML=`
<iframe src="https://gogoanime3.co/${id}-episode-${i}" allowfullscreen></iframe>
`

}

episodes.appendChild(btn)

}

document.getElementById("player").style.display="flex"

}

/* CERRAR */

function cerrarVideo(){

document.getElementById("player").style.display="none"

document.getElementById("video-container").innerHTML=""

document.getElementById("episodes").innerHTML=""

}

</script>

</body>
</html>
