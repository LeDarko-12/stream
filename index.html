<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MiStream</title>

<style>

body{
margin:0;
font-family:Arial;
background:#141414;
color:white;
}

.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:black;
display:flex;
align-items:center;
padding:0 40px;
z-index:100;
}

.logo{
color:#e50914;
font-size:28px;
font-weight:bold;
margin-right:30px;
}

.search input{
padding:8px;
border:none;
border-radius:4px;
}

.hero{
height:500px;
display:flex;
flex-direction:column;
justify-content:center;
padding-left:60px;
background-size:cover;
background-position:center;
margin-top:70px;
}

.hero h1{
font-size:60px;
}

.hero button{
padding:12px 25px;
font-size:18px;
margin-top:10px;
cursor:pointer;
}

.row{
margin-top:30px;
padding-left:40px;
}

.row-posters{
display:flex;
overflow-x:auto;
padding-top:20px;
}

.poster{
width:180px;
margin-right:10px;
cursor:pointer;
transition:.3s;
}

.poster:hover{
transform:scale(1.1);
}

.poster img{
width:100%;
border-radius:6px;
}

#player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.player-box{
width:90%;
max-width:1200px;
}

iframe{
width:100%;
height:80vh;
border:none;
}

.close{
position:absolute;
top:20px;
right:40px;
font-size:30px;
cursor:pointer;
}

.server-buttons button{
padding:8px 15px;
margin:5px;
cursor:pointer;
}

.episodes{
margin-top:10px;
display:flex;
flex-wrap:wrap;
}

.episodes button{
margin:3px;
padding:5px 10px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">MiStream</div>

<div class="search">
<input id="search" placeholder="Buscar...">
</div>

</div>

<div id="hero" class="hero"></div>

<div class="row">
<h2>Películas populares</h2>
<div class="row-posters" id="movies"></div>
</div>

<div class="row">
<h2>Series populares</h2>
<div class="row-posters" id="series"></div>
</div>

<div class="row">
<h2>⭐ Favoritos</h2>
<div class="row-posters" id="favorites"></div>
</div>

<div id="player">

<div class="close" onclick="closePlayer()">✕</div>

<div class="player-box">

<div class="server-buttons">

<button onclick="server1()">Servidor 1</button>
<button onclick="server2()">Servidor 2</button>

</div>

<div id="video"></div>

<div id="episodes" class="episodes"></div>

</div>

</div>

<script>

const API="8a2de0488825903a0a4b7d0ff12a3873"

let currentId=null
let currentType="movie"
let currentSeason=1

/* HERO */

async function loadHero(){

let r=await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API}&language=es-ES`)
let d=await r.json()

let movie=d.results[0]

let hero=document.getElementById("hero")

hero.style.backgroundImage=`
linear-gradient(to top,#141414,transparent),
url(https://image.tmdb.org/t/p/original${movie.backdrop_path})
`

hero.innerHTML=`
<h1>${movie.title}</h1>
<button onclick="play(${movie.id},'movie')">▶ Ver ahora</button>
`

}

/* PELICULAS */

async function loadMovies(){

let r=await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API}&language=es-ES`)
let d=await r.json()

render(d.results,"movies","movie")

}

/* SERIES */

async function loadSeries(){

let r=await fetch(`https://api.themoviedb.org/3/tv/popular?api_key=${API}&language=es-ES`)
let d=await r.json()

render(d.results,"series","tv")

}

/* RENDER */

function render(list,container,type){

let row=document.getElementById(container)
row.innerHTML=""

list.forEach(item=>{

if(!item.poster_path) return

let div=document.createElement("div")
div.className="poster"

div.innerHTML=`
<img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
`

div.onclick=()=>play(item.id,type)

row.appendChild(div)

})

}

/* PLAY */

async function play(id,type){

currentId=id
currentType=type

document.getElementById("player").style.display="flex"

document.getElementById("episodes").innerHTML=""

if(type==="tv"){

let r=await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API}&language=es-ES`)
let d=await r.json()

let episodes=document.getElementById("episodes")

for(let i=1;i<=10;i++){

let b=document.createElement("button")
b.innerText="Ep "+i

b.onclick=()=>playEpisode(i)

episodes.appendChild(b)

}

}

server1()

saveContinue(id,type)

}

/* EPISODIOS */

function playEpisode(ep){

document.getElementById("video").innerHTML=`
<iframe src="https://vidsrc.to/embed/tv/${currentId}/${currentSeason}/${ep}?lang=es"></iframe>
`

}

/* SERVIDOR 1 */

function server1(){

if(currentType==="movie"){

document.getElementById("video").innerHTML=`
<iframe src="https://vidsrc.to/embed/movie/${currentId}?lang=es"></iframe>
`

}else{

playEpisode(1)

}

}

/* SERVIDOR 2 */

function server2(){

if(currentType==="movie"){

document.getElementById("video").innerHTML=`
<iframe src="https://multiembed.mov/?video_id=${currentId}&tmdb=1"></iframe>
`

}else{

document.getElementById("video").innerHTML=`
<iframe src="https://multiembed.mov/?video_id=${currentId}&tmdb=1&s=1&e=1"></iframe>
`

}

}

/* CERRAR */

function closePlayer(){

document.getElementById("player").style.display="none"
document.getElementById("video").innerHTML=""

}

/* FAVORITOS */

function addFavorite(id,type){

let fav=JSON.parse(localStorage.getItem("fav")||"[]")

fav.push({id,type})

localStorage.setItem("fav",JSON.stringify(fav))

}

/* CONTINUAR */

function saveContinue(id,type){

localStorage.setItem("continue",JSON.stringify({id,type}))

}

/* BUSCAR */

document.getElementById("search").addEventListener("keypress",async e=>{

if(e.key==="Enter"){

let q=e.target.value

let r=await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API}&language=es-ES&query=${q}`)
let d=await r.json()

render(d.results,"movies","movie")

}

})

loadHero()
loadMovies()
loadSeries()

</script>

</body>
</html>
