<script>

const TMDB="8a2de0488825903a0a4b7d0ff12a3873"

let currentId
let currentType="movie"
let currentSeason=1
let currentEpisode=1

const servers=[

{
name:"VidSrc",
movie:id=>`https://vidsrc.to/embed/movie/${id}`,
tv:id=>`https://vidsrc.to/embed/tv/${id}/${currentSeason}/${currentEpisode}`
},

{
name:"AutoEmbed",
movie:id=>`https://autoembed.cc/movie/tmdb/${id}`,
tv:id=>`https://autoembed.cc/tv/tmdb/${id}-${currentSeason}-${currentEpisode}`
},

{
name:"MultiEmbed",
movie:id=>`https://multiembed.mov/?video_id=${id}&tmdb=1`,
tv:id=>`https://multiembed.mov/?video_id=${id}&tmdb=1&s=${currentSeason}&e=${currentEpisode}`
}

]

function openPlayer(id,type){

currentId=id
currentType=type
currentSeason=1
currentEpisode=1

document.getElementById("player").style.display="flex"

if(type==="tv") loadEpisodes()

loadServers()

}

function loadServers(){

let container=document.getElementById("servers")
container.innerHTML=""

servers.forEach(s=>{

let btn=document.createElement("button")
btn.innerText=s.name

btn.onclick=()=>{

let url=currentType==="movie"
?s.movie(currentId)
:s.tv(currentId)

document.getElementById("framePlayer").src=url

}

container.appendChild(btn)

})

let first=servers[0]

document.getElementById("framePlayer").src =
currentType==="movie"
?first.movie(currentId)
:first.tv(currentId)

}

async function loadEpisodes(){

let r=await fetch(`https://api.themoviedb.org/3/tv/${currentId}/season/1?api_key=${TMDB}&language=es-ES`)
let data=await r.json()

let list=document.getElementById("episodeList")
list.innerHTML=""

data.episodes.forEach(ep=>{

let btn=document.createElement("div")

btn.className="episode"
btn.innerText="Ep "+ep.episode_number

btn.onclick=()=>{
currentEpisode=ep.episode_number
loadServers()
}

list.appendChild(btn)

})

}

function closePlayer(){

document.getElementById("player").style.display="none"
document.getElementById("framePlayer").src=""

}

async function loadMovies(){

let r=await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${TMDB}&language=es-ES&page=1`)
let data=await r.json()

let row=document.getElementById("movies")
row.innerHTML=""

data.results.forEach(m=>{

if(!m.poster_path) return

let div=document.createElement("div")
div.className="poster"

div.innerHTML=`<img src="https://image.tmdb.org/t/p/w500${m.poster_path}">`

div.onclick=()=>openPlayer(m.id,"movie")

row.appendChild(div)

})

}

async function loadSeries(){

let r=await fetch(`https://api.themoviedb.org/3/tv/popular?api_key=${TMDB}&language=es-ES&page=1`)
let data=await r.json()

let row=document.getElementById("series")
row.innerHTML=""

data.results.forEach(s=>{

if(!s.poster_path) return

let div=document.createElement("div")
div.className="poster"

div.innerHTML=`<img src="https://image.tmdb.org/t/p/w500${s.poster_path}">`

div.onclick=()=>openPlayer(s.id,"tv")

row.appendChild(div)

})

}

async function loadAnime(){

let r=await fetch("https://api.jikan.moe/v4/top/anime")
let data=await r.json()

let row=document.getElementById("anime")
row.innerHTML=""

data.data.slice(0,20).forEach(a=>{

let div=document.createElement("div")
div.className="poster"

div.innerHTML=`<img src="${a.images.jpg.image_url}">`

div.onclick=()=>{

document.getElementById("player").style.display="flex"

document.getElementById("servers").innerHTML=""

document.getElementById("episodeList").innerHTML=`<h2>${a.title}</h2>`

document.getElementById("framePlayer").src=
`https://autoembed.cc/anime/mal/${a.mal_id}`

}

row.appendChild(div)

})

}

function searchAll(){

let q=document.getElementById("search").value.toLowerCase()

document.querySelectorAll(".poster").forEach(p=>{

let alt=p.innerText.toLowerCase()

p.style.display=alt.includes(q)?"block":"none"

})

}

loadMovies()
loadSeries()
loadAnime()

</script>
