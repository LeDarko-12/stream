<script>

const TMDB="8a2de0488825903a0a4b7d0ff12a3873"

let currentId=null
let currentType=null
let currentSeason=1
let currentEpisode=1

const pages={}

/* SERVERS */

const servers=[

{
name:"2Embed",
movie:id=>`https://www.2embed.cc/embed/${id}`,
tv:(id,s,e)=>`https://www.2embed.cc/embedtv/${id}?s=${s}&e=${e}`
},

{
name:"VidSrc",
movie:id=>`https://vidsrc.to/embed/movie/${id}`,
tv:(id,s,e)=>`https://vidsrc.to/embed/tv/${id}/${s}/${e}`
}

]

/* PLAYER */

function openPlayer(id,type){

currentId=id
currentType=type

currentSeason=1
currentEpisode=1

document.getElementById("seasonSelector").innerHTML=""
document.getElementById("episodeList").innerHTML=""

document.getElementById("player").style.display="flex"

loadServers()

if(type==="tv"){
loadSeasons()
}

}

/* SERVERS */

function loadServers(){

const container=document.getElementById("servers")

container.innerHTML=""

servers.forEach((s,i)=>{

const b=document.createElement("button")

b.innerText=s.name

b.onclick=()=>playServer(i)

container.appendChild(b)

})

playServer(0)

}

function playServer(i){

const s=servers[i]

let url

if(currentType==="movie"){

url=s.movie(currentId)

}else{

url=s.tv(currentId,currentSeason,currentEpisode)

}

document.getElementById("framePlayer").src=url

}

function closePlayer(){

document.getElementById("player").style.display="none"
document.getElementById("framePlayer").src=""

}

/* SEASONS */

async function loadSeasons(){

const r=await fetch(`https://api.themoviedb.org/3/tv/${currentId}?api_key=${TMDB}`)

const data=await r.json()

const box=document.getElementById("seasonSelector")

box.innerHTML=""

data.seasons
.filter(s=>s.season_number>0)
.sort((a,b)=>a.season_number-b.season_number)
.forEach(season=>{

const b=document.createElement("button")

b.innerText="Temp "+season.season_number

b.onclick=()=>{

currentSeason=season.season_number
currentEpisode=1

loadEpisodes()

}

box.appendChild(b)

})

loadEpisodes()

}

/* EPISODES */

async function loadEpisodes(){

const r=await fetch(`https://api.themoviedb.org/3/tv/${currentId}/season/${currentSeason}?api_key=${TMDB}`)

const data=await r.json()

const list=document.getElementById("episodeList")

list.innerHTML=""

data.episodes
.sort((a,b)=>a.episode_number-b.episode_number)
.forEach(ep=>{

const b=document.createElement("button")

b.innerText=ep.episode_number

if(ep.episode_number===currentEpisode){
b.style.background="#e50914"
}

b.onclick=()=>{

currentEpisode=ep.episode_number

playServer(0)

loadEpisodes()

}

list.appendChild(b)

})

}

/* CATEGORY + INFINITE SCROLL */

async function loadCategory(url,container,type){

if(!pages[container]) pages[container]=1

const r=await fetch(`${url}&page=${pages[container]}`)

const data=await r.json()

const row=document.getElementById(container)

data.results.forEach(item=>{

if(!item.poster_path) return

const div=document.createElement("div")

div.className="poster"

div.innerHTML=`
<img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
<span>${item.title||item.name}</span>
`

div.onclick=()=>openPlayer(item.id,type)

row.appendChild(div)

})

pages[container]++

row.onscroll=()=>{

if(row.scrollLeft+row.clientWidth>=row.scrollWidth-200){

loadCategory(url,container,type)

}

}

}

/* HERO */

async function loadHero(){

const r=await fetch(`https://api.themoviedb.org/3/trending/movie/day?api_key=${TMDB}`)

const data=await r.json()

const m=data.results[0]

document.getElementById("hero").style.backgroundImage=
`url(https://image.tmdb.org/t/p/original${m.backdrop_path})`

document.getElementById("heroTitle").innerText=m.title

window.heroId=m.id

}

function playHero(){
openPlayer(heroId,"movie")
}

/* SEARCH */

async function searchContent(){

const q=document.getElementById("search").value

if(q.length<3) return

const r=await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB}&query=${q}`)

const data=await r.json()

const row=document.getElementById("trending")

row.innerHTML=""

data.results.forEach(item=>{

if(!item.poster_path) return

const div=document.createElement("div")

div.className="poster"

div.innerHTML=`
<img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
<span>${item.title||item.name}</span>
`

div.onclick=()=>openPlayer(item.id,item.media_type)

row.appendChild(div)

})

}

/* LOAD CONTENT */

loadHero()

loadCategory(`https://api.themoviedb.org/3/trending/movie/day?api_key=${TMDB}`,"trending","movie")

loadCategory(`https://api.themoviedb.org/3/movie/popular?api_key=${TMDB}`,"moviesPopular","movie")

loadCategory(`https://api.themoviedb.org/3/tv/popular?api_key=${TMDB}`,"seriesPopular","tv")

</script>
