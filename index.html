<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>MiStream</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#141414;
color:white;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
display:flex;
align-items:center;
padding:0 40px;
z-index:10;
}

.logo{
color:#e50914;
font-size:30px;
font-weight:bold;
margin-right:40px;
}

.menu a{
margin-right:20px;
text-decoration:none;
color:white;
font-size:15px;
}

.menu a:hover{
color:#bbb;
}

/* BANNER */

.banner{
height:500px;
background-image:url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba");
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
padding:80px;
margin-bottom:40px;
}

.banner h1{
font-size:60px;
margin-bottom:20px;
}

.banner p{
width:500px;
margin-bottom:20px;
}

.banner button{
padding:12px 25px;
margin-right:10px;
border:none;
font-size:16px;
cursor:pointer;
}

.play{
background:white;
}

.info{
background:rgba(109,109,110,0.7);
color:white;
}

/* FILAS */

.row{
margin-top:40px;
padding-left:40px;
}

.row h2{
margin-bottom:10px;
}

.row-posters{
display:flex;
overflow-x:auto;
padding-bottom:20px;
}

.poster{
width:180px;
margin-right:10px;
transition:transform 0.3s;
cursor:pointer;
}

.poster:hover{
transform:scale(1.15);
}

.poster img{
width:100%;
border-radius:4px;
}

.row-posters::-webkit-scrollbar{
display:none;
}

/* REPRODUCTOR */

#player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

.player-content{
width:90%;
max-width:1200px;
position:relative;
}

#video-container iframe{
width:100%;
height:80vh;
border:none;
}

.close-btn{
position:absolute;
top:-40px;
right:0;
font-size:30px;
background:none;
border:none;
color:white;
cursor:pointer;
}

.close-btn:hover{
color:#e50914;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">MiStream</div>

<div class="menu">
<a href="#">Inicio</a>
<a href="#">Series</a>
<a href="#">Películas</a>
<a href="#">Mi lista</a>
</div>

</div>

<!-- BANNER -->

<div class="banner">

<h1>Bienvenido a MiStream</h1>

<p>
Tu plataforma gratuita de películas y series.
</p>

<div>
<button class="play">▶ Reproducir</button>
<button class="info">Más información</button>
</div>

</div>

<!-- FILA PELÍCULAS -->

<div class="row">

<h2>Películas</h2>

<div class="row-posters" id="movies-container"></div>

</div>

<!-- REPRODUCTOR -->

<div id="player">

<div class="player-content">

<button class="close-btn" onclick="cerrarVideo()">✕</button>

<div id="video-container"></div>

</div>

</div>

<script>

/* PELICULAS DE EJEMPLO */

const movies = [

{
title:"Inception",
poster:"https://image.tmdb.org/t/p/w500/9gk7adHYeDvHkCSEqAvQNLV5Uge.jpg",
imdb:"tt1375666"
},

{
title:"The Matrix",
poster:"https://image.tmdb.org/t/p/w500/f89U3ADr1oiB1s9GkdPOEpXUk5H.jpg",
imdb:"tt0133093"
},

{
title:"Interstellar",
poster:"https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg",
imdb:"tt0816692"
},

{
title:"Joker",
poster:"https://image.tmdb.org/t/p/w500/udDclJoHjfjb8Ekgsd4FDteOkCU.jpg",
imdb:"tt7286456"
}

]

let container = document.getElementById("movies-container")

movies.forEach(movie=>{

let poster = document.createElement("div")

poster.className="poster"

poster.innerHTML=`<img src="${movie.poster}">`

poster.onclick=()=>{
reproducir(movie.imdb)
}

container.appendChild(poster)

})

/* REPRODUCTOR */

function reproducir(imdb){

let player=document.getElementById("player")

let video=document.getElementById("video-container")

video.innerHTML=`
<iframe
src="https://multiembed.mov/?video_id=${imdb}"
allowfullscreen>
</iframe>
`

player.style.display="flex"

}

function cerrarVideo(){

document.getElementById("player").style.display="none"

document.getElementById("video-container").innerHTML=""

}

</script>

</body>
</html>
