<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AnimeStream</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<header class="navbar">
<h1 class="logo">AnimeStream</h1>

<input id="searchInput" type="text" placeholder="Buscar anime...">

<select id="genreFilter">
<option value="">Genero</option>
<option value="1">Acción</option>
<option value="2">Aventura</option>
<option value="4">Comedia</option>
<option value="10">Fantasia</option>
<option value="22">Romance</option>
</select>

<select id="yearFilter">
<option value="">Año</option>
<option>2024</option>
<option>2023</option>
<option>2022</option>
<option>2021</option>
</select>

</header>

<main>

<div id="animeGrid" class="anime-grid"></div>

<div id="loading" class="loading">
Cargando anime...
</div>

</main>

<button id="topBtn">⬆</button>

<script src="script.js"></script>

</body>
</html>
