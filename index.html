<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MiStream</title>

<script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:#000;
display:flex;
align-items:center;
padding:0 40px;
z-index:100;
}

.logo{
color:#e50914;
font-size:28px;
font-weight:bold;
margin-right:40px;
}

.search{
margin-left:auto;
}

.search input{
padding:8px;
border:none;
border-radius:4px;
}

.hero{
height:450px;
display:flex;
align-items:center;
padding:80px;
margin-top:70px;
background:linear-gradient(to top,#0f0f0f 10%,transparent),
url("https://image.tmdb.org/t/p/original/9Gtg2DzBhmYamXBS1hKAhiwbBKS.jpg");
background-size:cover;
}

.row{
margin-top:40px;
padding-left:40px;
}

.row-posters{
display:flex;
overflow-x:auto;
padding-top:20px;
}

.poster{
width:200px;
margin-right:12px;
cursor:pointer;
transition:.3s;
}

.poster:hover{
transform:scale(1.15);
}

.poster img{
width:100%;
border-radius:8px;
}

#player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.player-content{
width:90%;
max-width:1200px;
}

#video video{
width:100%;
height:80vh;
background:black;
}

#video iframe{
width:100%;
height:80vh;
border:none;
}

.close{
position:absolute;
top:20px;
right:40px;
font-size:30px;
cursor:pointer;
}

.server-buttons button{
margin:5px;
padding:6px 12px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">MiStream</div>

<div class="search">
<input id="search" placeholder="Buscar...">
</div>

</div>

<div class="hero">

<h1>MiStream</h1>
<p>Películas y series en español</p>

</div>

<div class="row">
<h2>🔥 Películas populares</h2>
<div class="row-posters" id="movies"></div>
</div>

<div class="row">
<h2>📺 Series populares</h2>
<div class="row-posters" id="series"></div>
</div>

<div id="player">

<div class="close" onclick="closePlayer()">✕</div>

<div class="player-content">

<div class="server-buttons">

<button onclick="useTorrent()">Servidor Torrent (sin anuncios)</button>
<button onclick="useVidsrc()">Servidor Streaming</button>

</div>

<div id="video"></div>

</div>

</div>

<script>

const API_KEY="8a2de0488825903a0a4b7d0ff12a3873"

let currentId=null

/* CARGAR PELICULAS */

async function loadMovies(){

let res=await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=es-ES`)
let data=await res.json()

render(data.results,"movies","movie")

}

/* CARGAR SERIES */

async function loadSeries(){

let res=await fetch(`https://api.themoviedb.org/3/tv/popular?api_key=${API_KEY}&language=es-ES`)
let data=await res.json()

render(data.results,"series","tv")

}

/* MOSTRAR POSTERS */

function render(list,container,type){

let row=document.getElementById(container)

row.innerHTML=""

list.forEach(item=>{

if(!item.poster_path) return

let poster=document.createElement("div")
poster.className="poster"

let img=`https://image.tmdb.org/t/p/w500${item.poster_path}`

poster.innerHTML=`<img src="${img}">`

poster.onclick=()=>{

currentId=item.id

openPlayer()

}

row.appendChild(poster)

})

}

/* ABRIR PLAYER */

function openPlayer(){

document.getElementById("player").style.display="flex"

}

/* TORRENT (sin anuncios) */

function useTorrent(){

const client=new WebTorrent()

document.getElementById("video").innerHTML="Cargando torrent..."

const torrentId="magnet:?xt=urn:btih:EXAMPLE"

client.add(torrentId,function(torrent){

const file=torrent.files.find(file=>file.name.endsWith(".mp4"))

file.renderTo("#video")

})

}

/* STREAMING */

function useVidsrc(){

document.getElementById("video").innerHTML=`
<iframe src="https://vidsrc.to/embed/movie/${currentId}?lang=es" allowfullscreen></iframe>
`

}

/* CERRAR */

function closePlayer(){

document.getElementById("player").style.display="none"

document.getElementById("video").innerHTML=""

}

/* BUSCAR */

document.getElementById("search").addEventListener("keypress",async e=>{

if(e.key==="Enter"){

let q=e.target.value

let res=await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&language=es-ES&query=${q}`)
let data=await res.json()

render(data.results,"movies","movie")

}

})

loadMovies()
loadSeries()

</script>

</body>
</html>
