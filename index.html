<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MiStream PRO</title>

<style>

*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}

body{
background:#0b0b0b;
color:white
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
height:65px;
background:#000;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
z-index:10
}

.logo{
color:#e50914;
font-size:26px;
font-weight:bold
}

.search{
background:#1a1a1a;
border:none;
padding:8px 12px;
border-radius:6px;
color:white;
width:220px
}

/* HERO */

.hero{
margin-top:65px;
height:40vh;
background:linear-gradient(to right,#000,#111);
display:flex;
align-items:center;
padding:40px
}

.hero h1{
font-size:45px
}

/* ROW */

.row{
padding:25px
}

.row h2{
margin-bottom:10px
}

.row-posters{
display:flex;
gap:12px;
overflow-x:auto
}

.row-posters::-webkit-scrollbar{
display:none
}

.poster{
min-width:150px;
cursor:pointer;
transition:.25s
}

.poster img{
width:100%;
border-radius:8px
}

.poster:hover{
transform:scale(1.1)
}

/* PLAYER */

#player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
align-items:center;
z-index:20;
padding-top:50px
}

.player-box{
width:85%;
height:65%
}

.player-box iframe{
width:100%;
height:100%;
border:none
}

.server-selector{
margin-top:10px;
display:flex;
gap:10px
}

.server-selector button{
background:#222;
border:none;
color:white;
padding:8px 14px;
cursor:pointer;
border-radius:6px
}

.server-selector button:hover{
background:#e50914
}

.season-selector{
margin-top:10px;
display:flex;
gap:8px;
flex-wrap:wrap
}

.episode-list{
margin-top:10px;
display:flex;
gap:8px;
flex-wrap:wrap;
justify-content:center
}

.episode{
background:#222;
padding:8px 12px;
border-radius:5px;
cursor:pointer
}

.episode:hover{
background:#e50914
}

.close{
position:absolute;
top:18px;
right:30px;
font-size:35px;
cursor:pointer
}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">MiStream</div>
<input class="search" id="search" placeholder="Buscar..." onkeyup="searchContent()">
</div>

<div class="hero">
<div>
<h1>MiStream PRO</h1>
<p>Películas y series en español</p>
</div>
</div>

<div class="row">
<h2>🔥 Películas populares</h2>
<div id="moviesPopular" class="row-posters"></div>
</div>

<div class="row">
<h2>💥 Acción</h2>
<div id="moviesAction" class="row-posters"></div>
</div>

<div class="row">
<h2>👻 Terror</h2>
<div id="moviesHorror" class="row-posters"></div>
</div>

<div class="row">
<h2>📺 Series populares</h2>
<div id="seriesPopular" class="row-posters"></div>
</div>

<div id="player">

<div class="close" onclick="closePlayer()">✕</div>

<div class="player-box">
<iframe id="framePlayer"></iframe>
</div>

<div class="server-selector" id="servers"></div>

<div class="season-selector" id="seasonSelector"></div>

<div class="episode-list" id="episodeList"></div>

</div>

<script>

const TMDB="8a2de0488825903a0a4b7d0ff12a3873"

let currentId
let currentType
let currentSeason=1
let currentEpisode=1

const servers=[

{
name:"2Embed",
movie:id=>`https://www.2embed.cc/embed/${id}`,
tv:id=>`https://www.2embed.cc/embedtv/${id}?s=${currentSeason}&e=${currentEpisode}`
},

{
name:"VidSrc",
movie:id=>`https://vidsrc.to/embed/movie/${id}`,
tv:id=>`https://vidsrc.to/embed/tv/${id}/${currentSeason}/${currentEpisode}`
},

{
name:"MultiEmbed",
movie:id=>`https://multiembed.mov/?video_id=${id}&tmdb=1`,
tv:id=>`https://multiembed.mov/?video_id=${id}&tmdb=1&s=${currentSeason}&e=${currentEpisode}`
}

]

function openPlayer(id,type){

currentId=id
currentType=type
currentSeason=1
currentEpisode=1

document.getElementById("player").style.display="flex"

if(type==="tv"){
loadSeasons()
}else{
document.getElementById("seasonSelector").innerHTML=""
document.getElementById("episodeList").innerHTML=""
}

loadServers()

}

function loadServers(){

let container=document.getElementById("servers")
container.innerHTML=""

servers.forEach((s,i)=>{

let btn=document.createElement("button")
btn.innerText=s.name
btn.onclick=()=>playServer(i)

container.appendChild(btn)

})

playServer(0)

}

function playServer(index){

let s=servers[index]

let url=currentType==="movie"
?s.movie(currentId)
:s.tv(currentId)

document.getElementById("framePlayer").src=url

}

async function loadSeasons(){

let r=await fetch(`https://api.themoviedb.org/3/tv/${currentId}?api_key=${TMDB}&language=es`)
let data=await r.json()

let selector=document.getElementById("seasonSelector")
selector.innerHTML=""

data.seasons.forEach(season=>{

if(season.season_number===0)return

let btn=document.createElement("button")
btn.innerText="T"+season.season_number

btn.onclick=()=>{
currentSeason=season.season_number
loadEpisodes()
}

selector.appendChild(btn)

})

loadEpisodes()

}

async function loadEpisodes(){

let r=await fetch(`https://api.themoviedb.org/3/tv/${currentId}/season/${currentSeason}?api_key=${TMDB}&language=es`)
let data=await r.json()

let list=document.getElementById("episodeList")
list.innerHTML=""

data.episodes.forEach(ep=>{

let btn=document.createElement("div")
btn.className="episode"
btn.innerText="E"+ep.episode_number

btn.onclick=()=>{
currentEpisode=ep.episode_number
playServer(0)
}

list.appendChild(btn)

})

}

function closePlayer(){

document.getElementById("player").style.display="none"
document.getElementById("framePlayer").src=""

}

async function loadCategory(url,container,type){

let r=await fetch(url)
let data=await r.json()

let row=document.getElementById(container)

data.results.forEach(item=>{

if(!item.poster_path)return

let div=document.createElement("div")
div.className="poster"

div.innerHTML=`<img src="https://image.tmdb.org/t/p/w500${item.poster_path}">`

div.onclick=()=>openPlayer(item.id,type)

row.appendChild(div)

})

}

async function searchContent(){

let q=document.getElementById("search").value

if(q.length<3)return

let r=await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB}&language=es&query=${q}`)
let data=await r.json()

document.getElementById("moviesPopular").innerHTML=""
document.getElementById("seriesPopular").innerHTML=""

data.results.forEach(item=>{

if(!item.poster_path)return

let div=document.createElement("div")
div.className="poster"

div.innerHTML=`<img src="https://image.tmdb.org/t/p/w500${item.poster_path}">`

if(item.media_type==="movie"){

div.onclick=()=>openPlayer(item.id,"movie")
document.getElementById("moviesPopular").appendChild(div)

}

if(item.media_type==="tv"){

div.onclick=()=>openPlayer(item.id,"tv")
document.getElementById("seriesPopular").appendChild(div)

}

})

}

/* LOAD CATEGORIES */

loadCategory(`https://api.themoviedb.org/3/movie/popular?api_key=${TMDB}&language=es&page=1`,"moviesPopular","movie")

loadCategory(`https://api.themoviedb.org/3/discover/movie?api_key=${TMDB}&with_genres=28&language=es`,"moviesAction","movie")

loadCategory(`https://api.themoviedb.org/3/discover/movie?api_key=${TMDB}&with_genres=27&language=es`,"moviesHorror","movie")

loadCategory(`https://api.themoviedb.org/3/tv/popular?api_key=${TMDB}&language=es`,"seriesPopular","tv")

</script>

</body>
</html>
