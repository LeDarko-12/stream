<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>MiStream</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#141414;
color:white;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
display:flex;
align-items:center;
padding:0 40px;
z-index:10;
}

.logo{
color:#e50914;
font-size:30px;
font-weight:bold;
}

.search{
margin-left:auto;
}

.search input{
padding:8px;
border:none;
border-radius:4px;
}

/* BANNER */

.banner{
height:500px;
background-size:cover;
background-position:center;
display:flex;
align-items:center;
padding:80px;
margin-bottom:40px;
}

/* FILAS */

.row{
margin-top:40px;
padding-left:40px;
}

.row h2{
margin-bottom:10px;
}

.row-posters{
display:flex;
overflow-x:auto;
}

.poster{
width:180px;
margin-right:10px;
cursor:pointer;
transition:0.3s;
position:relative;
}

.poster:hover{
transform:scale(1.15);
}

.poster img{
width:100%;
border-radius:4px;
}

.fav{
position:absolute;
top:5px;
right:5px;
background:red;
color:white;
padding:4px;
font-size:12px;
border-radius:3px;
cursor:pointer;
}

/* REPRODUCTOR */

#player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

.player-content{
width:90%;
max-width:1200px;
position:relative;
}

#video-container iframe{
width:100%;
height:80vh;
border:none;
}

.close-btn{
position:absolute;
top:-40px;
right:0;
font-size:30px;
background:none;
border:none;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">MiStream</div>

<div class="search">
<input type="text" id="search" placeholder="Buscar...">
</div>

</div>

<!-- BANNER -->

<div class="banner" id="banner"></div>

<!-- TENDENCIAS -->

<div class="row">

<h2>🔥 Tendencias</h2>

<div class="row-posters" id="trending"></div>

</div>

<!-- ANIME -->

<div class="row">

<h2>📺 Anime</h2>

<div class="row-posters" id="anime"></div>

</div>

<!-- FAVORITOS -->

<div class="row">

<h2>⭐ Mi lista</h2>

<div class="row-posters" id="favorites"></div>

</div>

<!-- REPRODUCTOR -->

<div id="player">

<div class="player-content">

<button class="close-btn" onclick="cerrarVideo()">✕</button>

<div id="video-container"></div>

</div>

</div>

<script>

/* BASE DE DATOS */

const trending=[

{
title:"Interstellar",
poster:"https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg",
imdb:"tt0816692"
},

{
title:"Joker",
poster:"https://image.tmdb.org/t/p/w500/udDclJoHjfjb8Ekgsd4FDteOkCU.jpg",
imdb:"tt7286456"
},

{
title:"Avengers Endgame",
poster:"https://image.tmdb.org/t/p/w500/or06FN3Dka5tukK1e9sl16pB3iy.jpg",
imdb:"tt4154796"
}

]

const anime=[

{
title:"Attack on Titan",
poster:"https://image.tmdb.org/t/p/w500/hTP1DtLGFamjfu8WqjnuQdP1n4i.jpg",
imdb:"tt2560140"
},

{
title:"Death Note",
poster:"https://image.tmdb.org/t/p/w500/8yZdv3oR3ZzO3Wg7GZsJ2xO0Y6D.jpg",
imdb:"tt0877057"
},

{
title:"One Punch Man",
poster:"https://image.tmdb.org/t/p/w500/iE3s0lG5QVdEHOEZnoAxjmMtvne.jpg",
imdb:"tt4508902"
}

]

/* BANNER DINAMICO */

let banner=document.getElementById("banner")

let bannerMovies=[...trending]

let random=bannerMovies[Math.floor(Math.random()*bannerMovies.length)]

banner.style.backgroundImage=`url(${random.poster})`

/* CARGAR CONTENIDO */

function cargar(lista,containerId){

let container=document.getElementById(containerId)

container.innerHTML=""

lista.forEach(movie=>{

let div=document.createElement("div")

div.className="poster"

div.innerHTML=`
<img src="${movie.poster}">
<div class="fav">★</div>
`

div.onclick=()=>reproducir(movie.imdb)

div.querySelector(".fav").onclick=(e)=>{

e.stopPropagation()

guardarFavorito(movie)

}

container.appendChild(div)

})

}

cargar(trending,"trending")
cargar(anime,"anime")

/* FAVORITOS */

function guardarFavorito(movie){

let favoritos=JSON.parse(localStorage.getItem("favoritos"))||[]

favoritos.push(movie)

localStorage.setItem("favoritos",JSON.stringify(favoritos))

cargarFavoritos()

}

function cargarFavoritos(){

let favoritos=JSON.parse(localStorage.getItem("favoritos"))||[]

cargar(favoritos,"favorites")

}

cargarFavoritos()

/* BUSCADOR */

document.getElementById("search").addEventListener("keyup",function(){

let texto=this.value.toLowerCase()

let resultados=[...trending,...anime].filter(m=>

m.title.toLowerCase().includes(texto)

)

cargar(resultados,"trending")

})

/* REPRODUCTOR */

function reproducir(imdb){

let player=document.getElementById("player")

let video=document.getElementById("video-container")

video.innerHTML=`
<iframe
src="https://multiembed.mov/?video_id=${imdb}"
allowfullscreen>
</iframe>
`

player.style.display="flex"

}

function cerrarVideo(){

document.getElementById("player").style.display="none"

document.getElementById("video-container").innerHTML=""

}

</script>

</body>
</html>
