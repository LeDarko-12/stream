<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MiStream</title>

<style>

body{
margin:0;
font-family:Arial;
background:#141414;
color:white;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:black;
display:flex;
align-items:center;
padding:0 40px;
z-index:100;
}

.logo{
color:#e50914;
font-size:28px;
font-weight:bold;
}

/* HERO */

.hero{
height:400px;
margin-top:70px;
display:flex;
align-items:center;
padding-left:60px;
background:
linear-gradient(to top,#141414,transparent),
url("https://image.tmdb.org/t/p/original/9Gtg2DzBhmYamXBS1hKAhiwbBKS.jpg");
background-size:cover;
}

/* ROWS */

.row{
margin-top:30px;
padding-left:40px;
}

.row-posters{
display:flex;
overflow-x:auto;
padding-top:20px;
}

.poster{
width:180px;
margin-right:10px;
cursor:pointer;
transition:.3s;
}

.poster:hover{
transform:scale(1.1);
}

.poster img{
width:100%;
border-radius:6px;
}

/* PLAYER */

#player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.player-box{
width:90%;
max-width:1200px;
}

iframe{
width:100%;
height:80vh;
border:none;
}

.close{
position:absolute;
top:20px;
right:40px;
font-size:30px;
cursor:pointer;
}

.server-buttons{
margin-bottom:10px;
}

.server-buttons button{
padding:8px 15px;
margin-right:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">MiStream</div>
</div>

<div class="hero">
<h1>Streaming en Español</h1>
</div>

<div class="row">
<h2>Películas populares</h2>
<div class="row-posters" id="movies"></div>
</div>

<div class="row">
<h2>Series populares</h2>
<div class="row-posters" id="series"></div>
</div>

<div id="player">

<div class="close" onclick="closePlayer()">✕</div>

<div class="player-box">

<div class="server-buttons">
<button onclick="server1()">Servidor 1</button>
<button onclick="server2()">Servidor 2</button>
</div>

<div id="video"></div>

</div>

</div>

<script>

const API="8a2de0488825903a0a4b7d0ff12a3873"

let currentId=null
let currentType="movie"

/* CARGAR PELICULAS */

async function loadMovies(){

let r=await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API}&language=es-ES`)
let d=await r.json()

show(d.results,"movies","movie")

}

/* CARGAR SERIES */

async function loadSeries(){

let r=await fetch(`https://api.themoviedb.org/3/tv/popular?api_key=${API}&language=es-ES`)
let d=await r.json()

show(d.results,"series","tv")

}

/* MOSTRAR */

function show(list,container,type){

let row=document.getElementById(container)
row.innerHTML=""

list.forEach(item=>{

if(!item.poster_path) return

let div=document.createElement("div")
div.className="poster"

div.innerHTML=`
<img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
`

div.onclick=()=>{

currentId=item.id
currentType=type

openPlayer()

}

row.appendChild(div)

})

}

/* ABRIR */

function openPlayer(){

document.getElementById("player").style.display="flex"

server1()

}

/* SERVIDOR 1 */

function server1(){

if(currentType==="movie"){

document.getElementById("video").innerHTML=`
<iframe src="https://vidsrc.to/embed/movie/${currentId}?lang=es"></iframe>
`

}else{

document.getElementById("video").innerHTML=`
<iframe src="https://vidsrc.to/embed/tv/${currentId}/1/1?lang=es"></iframe>
`

}

}

/* SERVIDOR 2 */

function server2(){

if(currentType==="movie"){

document.getElementById("video").innerHTML=`
<iframe src="https://multiembed.mov/?video_id=${currentId}&tmdb=1"></iframe>
`

}else{

document.getElementById("video").innerHTML=`
<iframe src="https://multiembed.mov/?video_id=${currentId}&tmdb=1&s=1&e=1"></iframe>
`

}

}

/* CERRAR */

function closePlayer(){

document.getElementById("player").style.display="none"

document.getElementById("video").innerHTML=""

}

loadMovies()
loadSeries()

</script>

</body>
</html>
