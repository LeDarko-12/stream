<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MiStream PRO</title>

<style>
*{box-sizing:border-box}
body{margin:0;background:#0f0f0f;color:white;font-family:Arial}

.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:#000;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
z-index:10
}

.logo{color:#e50914;font-size:26px;font-weight:bold}

.search{
background:#1f1f1f;
border:none;
padding:8px 12px;
border-radius:6px;
color:white;
width:180px
}

.hero{
height:50vh;
margin-top:70px;
display:flex;
align-items:center;
padding:20px;
background-size:cover;
background-position:center
}

.hero-content{
background:rgba(0,0,0,.6);
padding:20px;
border-radius:10px;
max-width:600px
}

.hero button{
margin-top:10px;
padding:10px 20px;
background:#e50914;
border:none;
color:white;
cursor:pointer
}

.row{padding:20px}

.row-posters{
display:flex;
overflow-x:auto;
gap:10px
}

.poster{
min-width:130px;
cursor:pointer;
transition:.3s
}

.poster img{
width:100%;
border-radius:10px
}

.poster:hover{
transform:scale(1.15)
}

#player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:100
}

.player-box{
width:90%;
height:80%;
}

.player-box iframe{
width:100%;
height:100%;
border:none
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:35px;
cursor:pointer
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">MiStream PRO</div>
<input class="search" id="search" placeholder="Buscar..." onkeyup="searchContent()">
</div>

<div id="hero" class="hero">
<div class="hero-content" id="heroContent"></div>
</div>

<div class="row">
<h2>🔥 Películas populares</h2>
<div id="movies" class="row-posters"></div>
</div>

<div class="row">
<h2>📺 Series populares</h2>
<div id="series" class="row-posters"></div>
</div>

<div id="player">
<div class="close" onclick="closePlayer()">✕</div>
<div class="player-box">
<iframe id="framePlayer"></iframe>
</div>
</div>

<script>

const API="8a2de0488825903a0a4b7d0ff12a3873"
let currentId,currentType

async function loadHero(){

let r=await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API}&language=es-ES`)
let d=await r.json()

let movie=d.results[0]

document.getElementById("hero").style.backgroundImage=
`linear-gradient(to right,#0f0f0f,transparent),url(https://image.tmdb.org/t/p/original${movie.backdrop_path})`

document.getElementById("heroContent").innerHTML=
`<h1>${movie.title}</h1>
<p>${movie.overview.slice(0,150)}...</p>
<button onclick="play(${movie.id},'movie')">▶ Ver ahora</button>`
}

async function loadCategory(url,container,type){

let r=await fetch(url)
let d=await r.json()

let row=document.getElementById(container)
row.innerHTML=""

for(let item of d.results){

if(!item.poster_path) continue

let div=document.createElement("div")
div.className="poster"

div.innerHTML=
`<img src="https://image.tmdb.org/t/p/w500${item.poster_path}">`

div.onclick=()=>play(item.id,type)

row.appendChild(div)
}
}

function play(id,type){

currentId=id
currentType=type

document.getElementById("player").style.display="flex"

let url

if(type==="movie"){
url=`https://vidsrc.to/embed/movie/${id}?lang=es`
}else{
url=`https://vidsrc.to/embed/tv/${id}/1/1?lang=es`
}

document.getElementById("framePlayer").src=url
}

function closePlayer(){

document.getElementById("player").style.display="none"
document.getElementById("framePlayer").src=""
}

async function searchContent(){

let q=document.getElementById("search").value

if(q.length<3) return

let r=await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API}&language=es-ES&query=${q}`)

let d=await r.json()

let row=document.getElementById("movies")
row.innerHTML=""

for(let item of d.results){

if(!item.poster_path) continue

let type=item.media_type

let div=document.createElement("div")
div.className="poster"

div.innerHTML=
`<img src="https://image.tmdb.org/t/p/w500${item.poster_path}">`

div.onclick=()=>play(item.id,type==="tv"?"tv":"movie")

row.appendChild(div)
}
}

loadHero()

loadCategory(
`https://api.themoviedb.org/3/movie/popular?api_key=${API}&language=es-ES`,
"movies",
"movie"
)

loadCategory(
`https://api.themoviedb.org/3/tv/popular?api_key=${API}&language=es-ES`,
"series",
"tv"
)

</script>

</body>
</html>
