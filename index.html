<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>MiStream</title>

<style>

body{
margin:0;
background:#141414;
color:white;
font-family:Arial;
}

.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:black;
display:flex;
align-items:center;
padding:0 40px;
z-index:10;
}

.logo{
color:#e50914;
font-size:28px;
font-weight:bold;
}

.search{
margin-left:auto;
}

.search input{
padding:8px;
border-radius:4px;
border:none;
}

.hero{
height:500px;
display:flex;
flex-direction:column;
justify-content:center;
padding-left:60px;
margin-top:70px;
background-size:cover;
}

.row{
padding-left:40px;
margin-top:30px;
}

.row-posters{
display:flex;
overflow-x:auto;
margin-top:10px;
}

.poster{
width:180px;
margin-right:10px;
cursor:pointer;
transition:.3s;
}

.poster:hover{
transform:scale(1.1);
}

.poster img{
width:100%;
border-radius:6px;
}

#player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:100;
}

.player-box{
width:90%;
max-width:1200px;
}

iframe{
width:100%;
height:80vh;
border:none;
}

.close{
position:absolute;
top:20px;
right:40px;
font-size:30px;
cursor:pointer;
}

.server-buttons button{
margin:5px;
padding:8px 14px;
cursor:pointer;
}

.episodes{
margin-top:10px;
}

.episodes button{
margin:3px;
padding:5px 10px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">MiStream</div>

<div class="search">
<input id="search" placeholder="Buscar...">
</div>

</div>

<div id="hero" class="hero"></div>

<div class="row">
<h2>Películas populares</h2>
<div id="movies" class="row-posters"></div>
</div>

<div class="row">
<h2>Series populares</h2>
<div id="series" class="row-posters"></div>
</div>

<div id="player">

<div class="close" onclick="closePlayer()">✕</div>

<div class="player-box">

<div class="server-buttons">

<button onclick="loadServer(0)">Servidor 1</button>
<button onclick="loadServer(1)">Servidor 2</button>
<button onclick="loadServer(2)">Servidor 3</button>

</div>

<div id="video"></div>

<div id="episodes" class="episodes"></div>

</div>

</div>

<script>

const API="8a2de0488825903a0a4b7d0ff12a3873"

let currentId
let currentType
let currentSeason=1
let currentEpisode=1
let serverIndex=0

/* SERVIDORES */

const movieServers=[
(id)=>`https://vidsrc.to/embed/movie/${id}?lang=es&subtitle=es`,
(id)=>`https://multiembed.mov/?video_id=${id}&tmdb=1&lang=es`,
(id)=>`https://vidsrc.me/embed/movie?tmdb=${id}&lang=es`
]

const tvServers=[
(id,s,e)=>`https://vidsrc.to/embed/tv/${id}/${s}/${e}?lang=es&subtitle=es`,
(id,s,e)=>`https://multiembed.mov/?video_id=${id}&tmdb=1&s=${s}&e=${e}&lang=es`,
(id,s,e)=>`https://vidsrc.me/embed/tv?tmdb=${id}&season=${s}&episode=${e}&lang=es`
]

/* HERO */

async function loadHero(){

let r=await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API}&language=es-ES&region=ES`)
let d=await r.json()

let movie=d.results[0]

let hero=document.getElementById("hero")

hero.style.backgroundImage=`
linear-gradient(to top,#141414,transparent),
url(https://image.tmdb.org/t/p/original${movie.backdrop_path})
`

hero.innerHTML=`
<h1>${movie.title}</h1>
<button onclick="play(${movie.id},'movie')">▶ Ver</button>
`

}

/* CARGAR PELICULAS */

async function loadMovies(){

let r=await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API}&language=es-ES&region=ES`)
let d=await r.json()

render(d.results,"movies","movie")

}

/* CARGAR SERIES */

async function loadSeries(){

let r=await fetch(`https://api.themoviedb.org/3/tv/popular?api_key=${API}&language=es-ES`)
let d=await r.json()

render(d.results,"series","tv")

}

/* MOSTRAR POSTERS */

function render(list,container,type){

let row=document.getElementById(container)

row.innerHTML=""

list.forEach(item=>{

if(!item.poster_path) return

let div=document.createElement("div")

div.className="poster"

div.innerHTML=`
<img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
`

div.onclick=()=>play(item.id,type)

row.appendChild(div)

})

}

/* PLAY */

async function play(id,type){

currentId=id
currentType=type
serverIndex=0

document.getElementById("player").style.display="flex"

document.getElementById("episodes").innerHTML=""

if(type==="tv"){

for(let i=1;i<=12;i++){

let b=document.createElement("button")

b.innerText="Ep "+i

b.onclick=()=>{

currentEpisode=i
loadServer(serverIndex)

}

document.getElementById("episodes").appendChild(b)

}

}

loadServer(0)

}

/* CARGAR SERVIDOR */

function loadServer(index){

serverIndex=index

let url

if(currentType==="movie"){

url=movieServers[index](currentId)

}else{

url=tvServers[index](currentId,currentSeason,currentEpisode)

}

document.getElementById("video").innerHTML=`
<iframe src="${url}" allowfullscreen></iframe>
`

}

/* CERRAR */

function closePlayer(){

document.getElementById("player").style.display="none"

document.getElementById("video").innerHTML=""

}

/* BUSCAR */

document.getElementById("search").addEventListener("keypress",async e=>{

if(e.key==="Enter"){

let q=e.target.value

let r=await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API}&language=es-ES&query=${q}`)

let d=await r.json()

render(d.results,"movies","movie")

}

})

loadHero()
loadMovies()
loadSeries()

</script>

</body>
</html>
