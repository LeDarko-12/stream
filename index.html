<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MiStream ULTRA</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b0b0b;
color:white;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:#000;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
z-index:20;
}

.logo{
color:#e50914;
font-size:28px;
font-weight:bold;
}

.search{
background:#1a1a1a;
border:none;
padding:10px;
border-radius:6px;
color:white;
width:230px;
}

/* HERO */

.hero{
margin-top:70px;
height:70vh;
background-size:cover;
background-position:center;
display:flex;
align-items:end;
padding:50px;
background-image:linear-gradient(to top,black,transparent);
}

.hero-content{
max-width:500px;
}

.hero h1{
font-size:50px;
margin-bottom:10px;
}

.hero button{
background:#e50914;
border:none;
padding:12px 20px;
color:white;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

/* ROW */

.row{
padding:25px;
}

.row h2{
margin-bottom:12px;
}

.row-posters{
display:flex;
gap:12px;
overflow-x:auto;
}

.row-posters::-webkit-scrollbar{
height:6px;
}

.row-posters::-webkit-scrollbar-thumb{
background:#e50914;
border-radius:6px;
}

/* POSTER */

.poster{
min-width:160px;
cursor:pointer;
position:relative;
transition:.3s;
}

.poster img{
width:100%;
border-radius:8px;
}

.poster span{
position:absolute;
bottom:0;
width:100%;
padding:10px;
background:linear-gradient(transparent,rgba(0,0,0,.9));
opacity:0;
font-size:13px;
}

.poster:hover span{
opacity:1;
}

.poster:hover{
transform:scale(1.1);
}

/* PLAYER */

#player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
align-items:center;
z-index:50;
padding-top:60px;
}

.player-box{
width:85%;
height:65%;
}

.player-box iframe{
width:100%;
height:100%;
border:none;
}

.close{
position:absolute;
top:15px;
right:25px;
font-size:35px;
cursor:pointer;
}

/* BUTTONS */

.server-selector,
.season-selector,
.episode-list{
margin-top:10px;
display:flex;
gap:8px;
flex-wrap:wrap;
justify-content:center;
}

button{
background:#222;
border:none;
padding:8px 14px;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#e50914;
}

/* TOP BUTTON */

.topBtn{
position:fixed;
bottom:25px;
right:25px;
background:#e50914;
border:none;
padding:12px 16px;
border-radius:50%;
cursor:pointer;
display:none;
}

/* FOOTER */

.footer{
margin-top:40px;
background:#000;
text-align:center;
padding:25px;
color:#777;
}

/* MOBILE */

@media(max-width:700px){

.hero h1{
font-size:35px;
}

.poster{
min-width:120px;
}

}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">MiStream</div>
<input class="search" id="search" placeholder="Buscar..." onkeyup="searchContent()">
</div>

<div class="hero" id="hero">
<div class="hero-content">
<h1 id="heroTitle">MiStream ULTRA</h1>
<button onclick="playHero()">▶ Ver ahora</button>
</div>
</div>

<div class="row">
<h2>🔥 Trending hoy</h2>
<div id="trending" class="row-posters"></div>
</div>

<div class="row">
<h2>🎬 Películas populares</h2>
<div id="moviesPopular" class="row-posters"></div>
</div>

<div class="row">
<h2>📺 Series populares</h2>
<div id="seriesPopular" class="row-posters"></div>
</div>

<div class="row">
<h2>⭐ Favoritos</h2>
<div id="favorites" class="row-posters"></div>
</div>

<button class="topBtn" onclick="scrollTopPage()">↑</button>

<div id="player">

<div class="close" onclick="closePlayer()">✕</div>

<div class="player-box">
<iframe id="framePlayer"></iframe>
</div>

<div class="server-selector" id="servers"></div>
<div class="season-selector" id="seasonSelector"></div>
<div class="episode-list" id="episodeList"></div>

</div>

<div class="footer">
MiStream ULTRA © 2026
</div>

<script>

const TMDB="8a2de0488825903a0a4b7d0ff12a3873"

let currentId
let currentType
let currentSeason=1
let currentEpisode=1

const servers=[

{
name:"VidSrc",
movie:id=>`https://vidsrc.to/embed/movie/${id}`,
tv:id=>`https://vidsrc.to/embed/tv/${id}/${currentSeason}/${currentEpisode}`
},

{
name:"2Embed",
movie:id=>`https://www.2embed.cc/embed/${id}`,
tv:id=>`https://www.2embed.cc/embedtv/${id}?s=${currentSeason}&e=${currentEpisode}`
}

]

function openPlayer(id,type){

localStorage.setItem("lastContent",JSON.stringify({id,type}))

currentId=id
currentType=type

document.getElementById("player").style.display="flex"

loadServers()

}

function loadServers(){

let c=document.getElementById("servers")
c.innerHTML=""

servers.forEach((s,i)=>{

let b=document.createElement("button")
b.innerText=s.name
b.onclick=()=>playServer(i)

c.appendChild(b)

})

playServer(0)

}

function playServer(i){

let s=servers[i]

let url=currentType==="movie"
?s.movie(currentId)
:s.tv(currentId)

document.getElementById("framePlayer").src=url

}

function closePlayer(){

document.getElementById("player").style.display="none"
document.getElementById("framePlayer").src=""

}

async function loadCategory(url,container,type){

let r=await fetch(url)
let data=await r.json()

let row=document.getElementById(container)

data.results.forEach(item=>{

if(!item.poster_path)return

let div=document.createElement("div")
div.className="poster"

div.innerHTML=`
<img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
<span>${item.title||item.name}</span>
`

div.onclick=()=>openPlayer(item.id,type)

div.oncontextmenu=(e)=>{
e.preventDefault()
addFavorite(item)
}

row.appendChild(div)

})

}

function addFavorite(item){

let fav=JSON.parse(localStorage.getItem("favorites")||"[]")

fav.push(item)

localStorage.setItem("favorites",JSON.stringify(fav))

loadFavorites()

}

function loadFavorites(){

let fav=JSON.parse(localStorage.getItem("favorites")||"[]")

let row=document.getElementById("favorites")

row.innerHTML=""

fav.forEach(item=>{

let div=document.createElement("div")
div.className="poster"

div.innerHTML=`
<img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
<span>${item.title||item.name}</span>
`

row.appendChild(div)

})

}

async function loadHero(){

let r=await fetch(`https://api.themoviedb.org/3/trending/movie/day?api_key=${TMDB}`)

let data=await r.json()

let m=data.results[0]

document.getElementById("hero").style.backgroundImage=
`url(https://image.tmdb.org/t/p/original${m.backdrop_path})`

document.getElementById("heroTitle").innerText=m.title

window.heroId=m.id

}

function playHero(){
openPlayer(heroId,"movie")
}

async function searchContent(){

let q=document.getElementById("search").value

if(q.length<3)return

let r=await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB}&query=${q}`)
let data=await r.json()

document.getElementById("moviesPopular").innerHTML=""

data.results.forEach(item=>{

if(!item.poster_path)return

let div=document.createElement("div")
div.className="poster"

div.innerHTML=`
<img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
<span>${item.title||item.name}</span>
`

div.onclick=()=>openPlayer(item.id,item.media_type)

document.getElementById("moviesPopular").appendChild(div)

})

}

/* TOP BUTTON */

window.onscroll=()=>{

let btn=document.querySelector(".topBtn")

if(document.documentElement.scrollTop>400){
btn.style.display="block"
}else{
btn.style.display="none"
}

}

function scrollTopPage(){
window.scrollTo({top:0,behavior:"smooth"})
}

/* LOAD CONTENT */

loadHero()

loadCategory(`https://api.themoviedb.org/3/trending/movie/day?api_key=${TMDB}`,"trending","movie")

loadCategory(`https://api.themoviedb.org/3/movie/popular?api_key=${TMDB}`,"moviesPopular","movie")

loadCategory(`https://api.themoviedb.org/3/tv/popular?api_key=${TMDB}`,"seriesPopular","tv")

loadFavorites()

</script>

</body>
</html>
